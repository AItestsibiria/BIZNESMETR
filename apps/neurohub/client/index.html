    <!-- Eugene 2026-05-17: убраны старые PNG-иконки с lego «MuziAi» — теперь
         только SVG (всегда актуальный бренд). iOS Safari fallback на favicon.svg. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3" />
    <!-- Eugene 2026-05-18 Босс «удали эту картинку из проекта правило было».
         apple-touch-icon УБРАН — это была причина почему iOS lock-screen
         показывал фиолетовый waveform-логотип MuzaAi как fallback artwork
         для аудио. Теперь если MediaSession.metadata.artwork не загрузится,
         iOS возьмёт generic music icon (нейтральный), а НЕ наш логотип.
         Favicon в browser tab остаётся через rel="icon" (выше). -->
    <!-- Eugene 2026-05-18 8-я итерация LS: apple-mobile-web-app-title="MuzaAi"
         (НЕ пустой) — это title который iOS показывает рядом с NowPlaying
         как «app source» в Control Center. Пустой → iOS брал document.title
         («MuzaAi — Создавай музыку с AI») и обрезал как fallback. Установка
         "MuzaAi" делает source label чистым. Не влияет на title трека из
         MediaSession.metadata.title (это разные слоты). -->
    <meta name="apple-mobile-web-app-title" content="MuzaAi" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- format-detection: отключает iOS auto-formatting телефонных номеров /
         адресов / email как clickable links — иначе title треков с цифрами
         (например «Поздравление на 30 лет») может стать tel:link. -->
    <meta name="format-detection" content="telephone=no,address=no,email=no" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Redirect non-hash routes to hash-router paths for share/play links
      // so that direct URLs like /share/42 (sent in emails/QR) work with wouter's useHashLocation.
      (function () {
        var p = window.location.pathname;
        var m = p.match(/^\/(share|play|track)\/([\w-]+)\/?$/);
        if (m) {
          var target = '/' + window.location.search + '#/' + m[1] + '/' + m[2];
          window.location.replace(target);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
