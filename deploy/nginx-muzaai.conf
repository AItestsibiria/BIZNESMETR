# Nginx config для перехода muziai.ru → muzaai.ru (Eugene 2026-05-15)
#
# Сценарий: muzaai.ru — основной домен. muziai.ru — старый, делает 301-redirect
# на muzaai.ru (сохраняет SEO, все старые ссылки работают).
#
# Куда положить на VPS (31.130.148.107):
#   /etc/nginx/sites-available/muzaai.ru
# Symlink:
#   ln -sf /etc/nginx/sites-available/muzaai.ru /etc/nginx/sites-enabled/muzaai.ru
# Удалить старый config muziai.ru (он замещается этим):
#   rm /etc/nginx/sites-enabled/muziai.ru  # старый
# Проверить:
#   nginx -t && systemctl reload nginx
#
# SSL: certbot выпустит сертификаты ОБА (muzaai.ru + muziai.ru) одной командой:
#   certbot --nginx -d muzaai.ru -d www.muzaai.ru -d muziai.ru -d www.muziai.ru
# Certbot сам добавит SSL-блоки и redirect 80→443. После этого этот файл
# обновится автоматически (certbot inject).

# ===== 1. HTTP → HTTPS redirect для обоих доменов (если certbot ещё не настроил) =====
# Certbot обычно сам добавляет 80→443 redirect. Этот блок — для случая
# до certbot'а или если certbot не сработал.
server {
    listen 80;
    listen [::]:80;
    server_name muzaai.ru www.muzaai.ru muziai.ru www.muziai.ru;

    # Let's Encrypt webroot для ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное — на HTTPS muzaai.ru
    location / {
        return 301 https://muzaai.ru$request_uri;
    }
}

# ===== 2. muziai.ru (старый домен) → 301 на muzaai.ru =====
# Это сохраняет SEO + все ранее отправленные ссылки работают.
# 301 = permanent — поисковики обновят индекс.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name muziai.ru www.muziai.ru;

    # SSL сертификаты — единые для обоих доменов (Let's Encrypt SAN)
    ssl_certificate /etc/letsencrypt/live/muzaai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/muzaai.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 301 redirect ВСЕХ путей с muziai.ru → muzaai.ru
    # Включая /api/*, /share/*, /play/*, /track/*, /admin и т.д.
    return 301 https://muzaai.ru$request_uri;
}

# ===== 3. muzaai.ru (новый primary домен) → proxy на pm2 backend :5000 =====
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name muzaai.ru www.muzaai.ru;

    # SSL
    ssl_certificate /etc/letsencrypt/live/muzaai.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/muzaai.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Канонический хост (www.muzaai.ru → muzaai.ru)
    if ($host = www.muzaai.ru) {
        return 301 https://muzaai.ru$request_uri;
    }

    # Body size limit (audio upload 32MB + slack)
    client_max_body_size 50M;

    # Аудио / cover artwork: range-requests на /api/stream/*
    location ~ ^/api/(stream|cover) {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }

    # Default proxy → Express :5000
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
