name: Deploy to VPS
on:
  push:
    branches: [main]
    paths: ["*.html", "*.sh", ".github/workflows/deploy.yml"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy files + setup server
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

          # Копируем все HTML файлы
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
            *.html root@72.56.247.149:/var/www/biznesmetr/

          # Настраиваем CRM прокси и nginx на сервере
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@72.56.247.149 << 'SSHEOF'

          # Создаём Claude прокси (порт 3131)
          cat > /opt/claude-proxy.py << 'PYEOF'
from http.server import HTTPServer, BaseHTTPRequestHandler
from openai import OpenAI
import json

client = OpenAI(api_key="sk-SDjacOjZ_MuibHMtmWW-Qw", base_url="https://api.timeweb.ai/v1")

class H(BaseHTTPRequestHandler):
    def log_message(self, *a): pass
    def do_OPTIONS(self):
        self.send_response(200)
        self.send_header("Access-Control-Allow-Origin","*")
        self.send_header("Access-Control-Allow-Methods","POST,OPTIONS")
        self.send_header("Access-Control-Allow-Headers","Content-Type")
        self.end_headers()
    def do_POST(self):
        n = int(self.headers.get("Content-Length",0))
        body = json.loads(self.rfile.read(n))
        msgs = body.get("messages",[])
        sys_msg = body.get("system","")
        if sys_msg:
            msgs = [{"role":"system","content":sys_msg}] + msgs
        try:
            resp = client.chat.completions.create(
                model="anthropic/claude-sonnet-4-5",
                messages=msgs,
                max_tokens=body.get("max_tokens",1000)
            )
            result = {"content":[{"type":"text","text":resp.choices[0].message.content}]}
            code = 200
        except Exception as e:
            result = {"error":str(e)}
            code = 500
        self.send_response(code)
        self.send_header("Content-Type","application/json")
        self.send_header("Access-Control-Allow-Origin","*")
        self.end_headers()
        self.wfile.write(json.dumps(result).encode())

HTTPServer(("127.0.0.1",3131),H).serve_forever()
PYEOF

          # Создаём CRM прокси (порт 3132)
          cat > /opt/crm-proxy.py << 'PYEOF'
from http.server import HTTPServer, BaseHTTPRequestHandler
import urllib.request, urllib.error, json, ssl

ctx = ssl.create_default_context()
ctx.check_hostname = False
ctx.verify_mode = ssl.CERT_NONE

class H(BaseHTTPRequestHandler):
    def log_message(self, *a): pass
    def cors(self):
        self.send_header("Access-Control-Allow-Origin","*")
        self.send_header("Access-Control-Allow-Methods","POST,OPTIONS")
        self.send_header("Access-Control-Allow-Headers","Content-Type")
    def do_OPTIONS(self):
        self.send_response(200); self.cors(); self.end_headers()
    def do_POST(self):
        n = int(self.headers.get("Content-Length",0))
        body = json.loads(self.rfile.read(n))
        domain = body.get("crm_domain","")
        path   = body.get("path","/")
        method = body.get("method","GET").upper()
        data   = body.get("data",None)
        token  = body.get("token",None)
        if token and "api_token" not in path:
            sep = "&" if "?" in path else "?"
            path = path + sep + "api_token=" + token
        url = f"https://{domain}{path}"
        post_data = json.dumps(data).encode() if data else None
        req = urllib.request.Request(url, data=post_data, method=method,
            headers={"Content-Type":"application/json","Accept":"application/json"})
        try:
            with urllib.request.urlopen(req, timeout=30, context=ctx) as r:
                resp = r.read()
                self.send_response(200)
                self.send_header("Content-Type","application/json")
                self.cors(); self.end_headers()
                self.wfile.write(resp)
        except urllib.error.HTTPError as e:
            resp = e.read()
            self.send_response(e.code)
            self.send_header("Content-Type","application/json")
            self.cors(); self.end_headers()
            self.wfile.write(resp)
        except Exception as e:
            self.send_response(500)
            self.send_header("Content-Type","application/json")
            self.cors(); self.end_headers()
            self.wfile.write(json.dumps({"error":str(e)}).encode())

HTTPServer(("127.0.0.1",3132),H).serve_forever()
PYEOF

          # Systemd сервисы
          cat > /etc/systemd/system/claude-proxy.service << 'SEOF'
[Unit]
Description=Claude AI Proxy
After=network.target
[Service]
ExecStart=/usr/bin/python3 /opt/claude-proxy.py
Restart=always
RestartSec=3
[Install]
WantedBy=multi-user.target
SEOF

          cat > /etc/systemd/system/crm-proxy.service << 'SEOF'
[Unit]
Description=CRM API Proxy
After=network.target
[Service]
ExecStart=/usr/bin/python3 /opt/crm-proxy.py
Restart=always
RestartSec=3
[Install]
WantedBy=multi-user.target
SEOF

          # Устанавливаем openai
          pip3 install openai --break-system-packages -q

          # Nginx конфиг
          cat > /etc/nginx/sites-available/biznesmetr << 'NEOF'
server {
    listen 80 default_server;
    server_name _;
    root /var/www/biznesmetr;
    index index.html;
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    client_max_body_size 10m;

    location /api/claude {
        proxy_pass http://127.0.0.1:3131;
        proxy_read_timeout 60;
        proxy_set_header Content-Type application/json;
    }

    location /api/crm {
        proxy_pass http://127.0.0.1:3132;
        proxy_read_timeout 30;
        proxy_set_header Content-Type application/json;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
NEOF

          systemctl daemon-reload
          systemctl enable claude-proxy crm-proxy
          systemctl restart claude-proxy crm-proxy
          ln -sf /etc/nginx/sites-available/biznesmetr /etc/nginx/sites-enabled/
          rm -f /etc/nginx/sites-enabled/default
          nginx -t && systemctl reload nginx
          echo "✓ Сервер полностью настроен"
SSHEOF
