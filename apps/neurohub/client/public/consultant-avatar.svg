    <path d="M 22 45 L 27 45 L 27 86 L 22 86 Z" fill="url(#bizTrousers)"/>
    <path d="M 29 45 L 34 45 L 34 86 L 29 86 Z" fill="url(#bizTrousers)"/>
    <!-- Туфли -->
    <ellipse cx="24.5" cy="88" rx="3" ry="1.5" fill="rgba(76,29,149,0.95)"/>
    <ellipse cx="31.5" cy="88" rx="3" ry="1.5" fill="rgba(76,29,149,0.95)"/>
    <!-- Руки -->
    <path d="M 18 36 Q 16 48 17 60" stroke="url(#bizJacket)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 38 36 Q 40 48 36 56" stroke="url(#bizJacket)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Планшет -->
    <rect x="30" y="52" width="10" height="8" rx="0.8" fill="rgba(40,40,60,0.98)"/>
    <rect x="31" y="53" width="8" height="6" rx="0.3" fill="rgba(147,197,253,0.7)"/>
    <circle cx="33" cy="57" r="0.7" fill="#a78bfa"/>
    <line x1="33.6" y1="57" x2="33.6" y2="54.5" stroke="#a78bfa" stroke-width="0.3"/>
    <!-- Акцентная нота -->
    <g opacity="0.6">
      <circle cx="48" cy="20" r="0.9" fill="#a78bfa"/>
      <line x1="48.8" y1="20" x2="48.8" y2="16" stroke="#a78bfa" stroke-width="0.4"/>
