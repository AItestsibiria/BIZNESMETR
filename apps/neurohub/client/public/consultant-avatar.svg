    <path d="M 38 33 Q 40 35 40 38 L 39 58 L 34 58 L 34 36 Z" fill="url(#bizJacket)"/>
    <path d="M 23 33 Q 28 31 33 33 L 33 36 L 23 36 Z" fill="url(#bizJacket)" opacity="0.7"/>
