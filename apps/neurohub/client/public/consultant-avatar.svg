    <rect x="30" y="86" width="4" height="6" fill="rgba(254,226,184,0.98)"/>
    <!-- Туфли -->
    <ellipse cx="24" cy="93" rx="3" ry="1.5" fill="rgba(40,30,60,0.98)"/>
    <ellipse cx="32" cy="93" rx="3" ry="1.5" fill="rgba(40,30,60,0.98)"/>
