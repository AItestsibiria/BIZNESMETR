<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="singerSilhouette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(196,181,253,0.95)"/>
      <stop offset="50%" stop-color="rgba(147,197,253,0.90)"/>
      <stop offset="100%" stop-color="rgba(165,243,252,0.85)"/>
    </linearGradient>
    <linearGradient id="singerHair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(167,139,250,0.75)"/>
      <stop offset="100%" stop-color="rgba(96,165,250,0.65)"/>
    </linearGradient>
    <radialGradient id="stageGlow" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="rgba(167,139,250,0.30)"/>
      <stop offset="100%" stop-color="rgba(167,139,250,0)"/>
    </radialGradient>
  </defs>
  <!-- Dark cosmic background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="64" cy="80" r="2" fill="#a78bfa" opacity="0.8"/>
  <circle cx="448" cy="64" r="1.5" fill="#22d3ee" opacity="0.7"/>
  <circle cx="420" cy="380" r="2.2" fill="#60a5fa" opacity="0.75"/>
  <circle cx="80" cy="420" r="1.8" fill="#a78bfa" opacity="0.7"/>
  <circle cx="464" cy="200" r="1.5" fill="#22d3ee" opacity="0.6"/>
  <circle cx="48" cy="260" r="1.2" fill="#60a5fa" opacity="0.6"/>
  <!-- Singer silhouette — scaled & centered, original viewBox 56x96 -->
  <g transform="translate(108,16) scale(5.3)">
    <!-- Stage glow -->
    <ellipse cx="28" cy="55" rx="26" ry="42" fill="url(#stageGlow)"/>
    <!-- Long hair behind shoulders -->
    <path d="M 14 28 Q 8 50 12 70 Q 16 76 20 72 Q 22 50 24 38 Z M 42 28 Q 48 50 44 70 Q 40 76 36 72 Q 34 50 32 38 Z" fill="url(#singerHair)"/>
    <!-- Face -->
    <ellipse cx="28" cy="22" rx="6.5" ry="9" fill="rgba(254,243,199,0.92)"/>
    <!-- Side bang -->
    <path d="M 21 16 Q 26 12 33 13 Q 35 18 33 22 Q 28 18 24 21 Q 21 20 21 16 Z" fill="url(#singerHair)"/>
    <!-- Closed eyes (singing) -->
    <path d="M 24 22 Q 25 21 26 22" stroke="rgba(50,30,20,0.7)" stroke-width="0.5" fill="none" stroke-linecap="round"/>
    <path d="M 30 22 Q 31 21 32 22" stroke="rgba(50,30,20,0.7)" stroke-width="0.5" fill="none" stroke-linecap="round"/>
    <!-- Singing mouth -->
    <ellipse cx="28" cy="27" rx="1.2" ry="0.8" fill="rgba(190,30,90,0.7)"/>
    <!-- Earrings — long note drops -->
    <path d="M 21 25 L 21 28" stroke="rgba(167,139,250,0.85)" stroke-width="0.5"/>
    <circle cx="21" cy="29" r="0.7" fill="rgba(167,139,250,0.85)"/>
    <path d="M 35 25 L 35 28" stroke="rgba(167,139,250,0.85)" stroke-width="0.5"/>
    <circle cx="35" cy="29" r="0.7" fill="rgba(167,139,250,0.85)"/>
    <!-- Neck -->
    <rect x="25.5" y="30" width="5" height="5" rx="1.5" fill="rgba(254,243,199,0.92)"/>
    <!-- Sleeves -->
    <path d="M 17 36 Q 14 44 16 56 L 22 56 L 22 40 Z M 39 36 Q 42 44 40 56 L 34 56 L 34 40 Z" fill="url(#singerSilhouette)" opacity="0.92"/>
    <!-- Body -->
    <path d="M 20 35 L 36 35 L 38 60 Q 28 62 18 60 Z" fill="url(#singerSilhouette)"/>
    <!-- Narrow pants -->
    <path d="M 22 60 Q 20 78 22 90 L 27 90 L 27 60 Z" fill="rgba(76,29,149,0.85)"/>
    <path d="M 34 60 Q 36 78 34 90 L 29 90 L 29 60 Z" fill="rgba(76,29,149,0.85)"/>
    <!-- Left arm pressed to body -->
    <path d="M 18 38 Q 16 48 17 58" stroke="url(#singerSilhouette)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Right arm holding microphone -->
    <path d="M 38 38 Q 42 32 44 28 Q 45 26 43 25" stroke="rgba(196,181,253,0.95)" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <!-- Microphone -->
    <ellipse cx="38" cy="26" rx="2.2" ry="3" fill="rgba(40,40,55,0.95)"/>
    <line x1="38" y1="29" x2="38" y2="34" stroke="rgba(40,40,55,0.95)" stroke-width="1.4" stroke-linecap="round"/>
    <!-- Mic grille -->
    <line x1="36.2" y1="25" x2="39.8" y2="25" stroke="rgba(196,181,253,0.7)" stroke-width="0.4"/>
    <line x1="36.2" y1="26.5" x2="39.8" y2="26.5" stroke="rgba(196,181,253,0.7)" stroke-width="0.4"/>
    <!-- Shoes -->
    <ellipse cx="24" cy="92" rx="2.5" ry="1.2" fill="rgba(76,29,149,0.95)"/>
    <ellipse cx="32" cy="92" rx="2.5" ry="1.2" fill="rgba(76,29,149,0.95)"/>
    <!-- Music notes around -->
    <g opacity="0.7">
      <circle cx="50" cy="14" r="1" fill="#a78bfa"/>
      <line x1="51" y1="14" x2="51" y2="9" stroke="#a78bfa" stroke-width="0.5"/>
      <circle cx="6" cy="20" r="0.8" fill="#22d3ee"/>
      <line x1="6.8" y1="20" x2="6.8" y2="16" stroke="#22d3ee" stroke-width="0.4"/>
      <circle cx="48" cy="48" r="0.7" fill="#60a5fa"/>
    </g>
  </g>
</svg>
