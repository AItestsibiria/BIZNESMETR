<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="85%">
      <stop offset="0%" stop-color="#3B2563"/>
      <stop offset="50%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F1230"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#D946EF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0F1230" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="muzaGrad" x1="0%" y1="20%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="20%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#D946EF"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow1" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <rect width="512" height="512" rx="100" fill="url(#centerGlow)"/>

  <g opacity="0.65">
    <circle cx="60" cy="80" r="1.5" fill="#ffffff"/>
    <circle cx="130" cy="60" r="1.2" fill="#ffffff" opacity="0.6"/>
    <circle cx="200" cy="100" r="1.5" fill="#ffffff" opacity="0.5"/>
    <circle cx="320" cy="70" r="1.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="400" cy="100" r="1.2" fill="#ffffff"/>
    <circle cx="460" cy="140" r="1" fill="#ffffff" opacity="0.6"/>
    <circle cx="40" cy="200" r="1.2" fill="#ffffff" opacity="0.5"/>
    <circle cx="475" cy="240" r="1.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="35" cy="320" r="1" fill="#ffffff" opacity="0.4"/>
    <circle cx="470" cy="380" r="1.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="80" cy="450" r="1.5" fill="#ffffff" opacity="0.5"/>
    <circle cx="180" cy="475" r="1.2" fill="#ffffff" opacity="0.6"/>
    <circle cx="340" cy="475" r="1.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="440" cy="460" r="1" fill="#ffffff" opacity="0.5"/>
  </g>

  <g transform="translate(256 280)">
    <text font-family="Verdana, Helvetica, sans-serif" font-size="116" font-weight="900" text-anchor="middle" letter-spacing="-3" filter="url(#glow1)" opacity="0.55">
      <tspan fill="#a78bfa">Muza</tspan><tspan fill="#60a5fa">Ai</tspan>
    </text>
    <text font-family="Verdana, Helvetica, sans-serif" font-size="116" font-weight="900" text-anchor="middle" letter-spacing="-3" filter="url(#glow2)">
      <tspan fill="url(#muzaGrad)">Muza</tspan><tspan fill="url(#aiGrad)">Ai</tspan>
    </text>
    <text font-family="Verdana, Helvetica, sans-serif" font-size="116" font-weight="900" text-anchor="middle" letter-spacing="-3">
      <tspan fill="url(#muzaGrad)">Muza</tspan><tspan fill="url(#aiGrad)">Ai</tspan>
    </text>
  </g>

  <g transform="translate(256 460)">
    <rect x="-105" y="-3" width="7" height="6" rx="2" fill="url(#barGrad)" opacity="0.8"/>
    <rect x="-87" y="-9" width="7" height="18" rx="2" fill="url(#barGrad)" opacity="0.85"/>
    <rect x="-69" y="-16" width="7" height="32" rx="2" fill="url(#barGrad)"/>
    <rect x="-51" y="-22" width="7" height="44" rx="2" fill="url(#barGrad)"/>
    <rect x="-33" y="-18" width="7" height="36" rx="2" fill="url(#barGrad)"/>
    <rect x="-15" y="-26" width="7" height="52" rx="2" fill="url(#barGrad)"/>
    <rect x="3" y="-22" width="7" height="44" rx="2" fill="url(#barGrad)"/>
    <rect x="21" y="-28" width="7" height="56" rx="2" fill="url(#barGrad)"/>
    <rect x="39" y="-20" width="7" height="40" rx="2" fill="url(#barGrad)"/>
    <rect x="57" y="-24" width="7" height="48" rx="2" fill="url(#barGrad)"/>
    <rect x="75" y="-14" width="7" height="28" rx="2" fill="url(#barGrad)"/>
    <rect x="93" y="-8" width="7" height="16" rx="2" fill="url(#barGrad)" opacity="0.85"/>
  </g>
</svg>
