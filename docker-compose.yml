services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: biznesmetr
      POSTGRES_PASSWORD: biznesmetr
      POSTGRES_DB: biznesmetr
    # Memory-tuned for a 2 GB host. Override via `docker compose` if you
    # have more RAM. shared_buffers ≈ 25% of expected RAM budget.
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=384MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - max_connections=20
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biznesmetr -d biznesmetr"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://biznesmetr:biznesmetr@postgres:5432/biznesmetr?schema=public
      # Cap V8 heap below the docker limit so OOM-killer doesn't pick Node first.
      NODE_OPTIONS: --max-old-space-size=640
    expose:
      - "3000"
    volumes:
      # Mount the Google service account JSON read-only at runtime.
      - ./secrets/google-credentials.json:/run/secrets/google-credentials.json:ro
    deploy:
      resources:
        limits:
          memory: 768M

  caddy:
    # TODO(muziai): swap for nginx/Traefik if that's what MuziAI uses.
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
