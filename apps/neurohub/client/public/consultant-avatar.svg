<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="bizHair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bizSkirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Звёзды MuziAi-палитра -->
  <circle cx="64" cy="80" r="2.5" fill="#a78bfa" opacity="0.6"/>
  <circle cx="448" cy="64" r="2" fill="#22d3ee" opacity="0.55"/>
  <circle cx="420" cy="380" r="2.2" fill="#60a5fa" opacity="0.5"/>
  <circle cx="80" cy="420" r="1.8" fill="#a78bfa" opacity="0.5"/>
  <!-- Cartoon помощница: каре + чёлка / белая блузка / синяя юбка с белым поясом -->
  <g transform="translate(108,16) scale(5.3)">
    <!-- Каре задний объём -->
    <path d="M 14 18 Q 11 30 13 42 Q 16 44 19 42 L 19 22 Z" fill="url(#bizHair)"/>
    <path d="M 42 18 Q 45 30 43 42 Q 40 44 37 42 L 37 22 Z" fill="url(#bizHair)"/>
    <!-- Голова -->
    <ellipse cx="28" cy="22" rx="9" ry="10" fill="#fde6cb" stroke="#1f2937" stroke-width="0.4"/>
    <!-- Чёлка -->
    <path d="M 19 14 Q 28 9 38 14 Q 39 18 37 22 Q 32 17 26 19 Q 22 18 20 22 Q 18 18 19 14 Z" fill="url(#bizHair)" stroke="#1f2937" stroke-width="0.3"/>
    <!-- Глаза -->
    <ellipse cx="25" cy="22" rx="1.5" ry="2" fill="#fff" stroke="#1f2937" stroke-width="0.3"/>
    <ellipse cx="31" cy="22" rx="1.5" ry="2" fill="#fff" stroke="#1f2937" stroke-width="0.3"/>
    <circle cx="25" cy="22.3" r="0.9" fill="#1f2937"/>
    <circle cx="31" cy="22.3" r="0.9" fill="#1f2937"/>
    <circle cx="25.4" cy="21.8" r="0.3" fill="#fff"/>
    <circle cx="31.4" cy="21.8" r="0.3" fill="#fff"/>
    <!-- Брови -->
    <path d="M 23 19 Q 25 18.4 27 19" stroke="#7c3aed" stroke-width="0.6" fill="none" stroke-linecap="round"/>
    <path d="M 29 19 Q 31 18.4 33 19" stroke="#7c3aed" stroke-width="0.6" fill="none" stroke-linecap="round"/>
    <!-- Щёчки -->
    <circle cx="21" cy="26" r="1.1" fill="rgba(244,114,182,0.4)"/>
    <circle cx="35" cy="26" r="1.1" fill="rgba(244,114,182,0.4)"/>
    <!-- Улыбка зубами -->
    <path d="M 25 27 Q 28 30 31 27" stroke="#1f2937" stroke-width="0.5" fill="rgba(180,60,80,0.65)" stroke-linecap="round"/>
    <path d="M 25.5 27.4 L 30.5 27.4" stroke="#fff" stroke-width="0.5"/>
    <!-- Серьги cyan -->
    <circle cx="19" cy="25" r="0.6" fill="#22d3ee"/>
    <circle cx="37" cy="25" r="0.6" fill="#22d3ee"/>
    <!-- Шея -->
    <rect x="25.5" y="31" width="5" height="4" rx="1" fill="#fde6cb" stroke="#1f2937" stroke-width="0.3"/>
    <!-- Белая блузка -->
    <path d="M 18 35 Q 16 36 16 39 L 17 56 L 39 56 L 40 39 Q 40 36 38 35 L 32 35 L 28 38 L 24 35 Z" fill="#ffffff" stroke="#1f2937" stroke-width="0.4"/>
    <!-- Воротничок -->
    <path d="M 24 35 L 28 38 L 32 35 L 31 35.5 L 28 37 L 25 35.5 Z" fill="#f3f4f6" stroke="#1f2937" stroke-width="0.3"/>
    <path d="M 25 35 L 25 37.5" stroke="#1f2937" stroke-width="0.25"/>
    <path d="M 31 35 L 31 37.5" stroke="#1f2937" stroke-width="0.25"/>
    <!-- Пуговица — фирменный фиолетовый -->
    <circle cx="28" cy="40" r="0.5" fill="#a78bfa"/>
    <!-- Белый пояс с фиолетовой пряжкой -->
    <rect x="17" y="54" width="22" height="3" fill="#ffffff" stroke="#1f2937" stroke-width="0.3"/>
    <rect x="27" y="54" width="2" height="3" fill="#7c3aed"/>
    <!-- Юбка-карандаш — MuziAi blue gradient -->
    <path d="M 17 57 L 39 57 L 36 82 L 20 82 Z" fill="url(#bizSkirt)" stroke="#1f2937" stroke-width="0.4"/>
    <!-- Ноги -->
    <rect x="22" y="82" width="3.5" height="8" fill="#fde6cb" stroke="#1f2937" stroke-width="0.3"/>
    <rect x="30.5" y="82" width="3.5" height="8" fill="#fde6cb" stroke="#1f2937" stroke-width="0.3"/>
    <!-- Туфли -->
    <path d="M 21 90 Q 24 89 26 90 L 26 92 L 21 92 Z" fill="#1f2937"/>
    <path d="M 30 90 Q 33 89 35 90 L 35 92 L 30 92 Z" fill="#1f2937"/>
    <path d="M 25 92 L 26 94" stroke="#1f2937" stroke-width="0.5"/>
    <path d="M 31 92 L 30 94" stroke="#1f2937" stroke-width="0.5"/>
    <!-- Левая рука -->
    <path d="M 17 38 Q 14 50 14 56" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="14" cy="57" r="1.3" fill="#fde6cb" stroke="#1f2937" stroke-width="0.3"/>
    <rect x="12.5" y="54" width="3" height="1.2" fill="#a78bfa"/>
    <!-- Правая рука в жесте -->
    <path d="M 39 38 Q 42 32 43 25" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="43" cy="24" r="1.3" fill="#fde6cb" stroke="#1f2937" stroke-width="0.3"/>
    <!-- Нота справа -->
    <g opacity="0.75">
      <circle cx="50" cy="14" r="1" fill="#22d3ee"/>
      <line x1="50.9" y1="14" x2="50.9" y2="10" stroke="#22d3ee" stroke-width="0.5"/>
    </g>
  </g>
</svg>
