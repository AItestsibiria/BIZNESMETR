    <linearGradient id="bizHair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(252,211,77,0.98)"/>
      <stop offset="100%" stop-color="rgba(217,170,55,0.95)"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Минималистичные акцент-звёзды -->
  <circle cx="64" cy="80" r="2" fill="#a78bfa" opacity="0.6"/>
  <circle cx="448" cy="64" r="1.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="80" cy="420" r="1.8" fill="#a78bfa" opacity="0.5"/>
