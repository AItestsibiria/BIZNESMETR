    </linearGradient>
    <linearGradient id="bizBlouse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(254,243,199,0.98)"/>
      <stop offset="100%" stop-color="rgba(252,211,77,0.92)"/>
