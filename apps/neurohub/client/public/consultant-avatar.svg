    <circle cx="33" cy="25" r="0.9" fill="rgba(244,114,182,0.4)"/>
    <!-- Серьги -->
    <circle cx="22" cy="24" r="0.5" fill="rgba(167,139,250,0.95)"/>
    <circle cx="34" cy="24" r="0.5" fill="rgba(167,139,250,0.95)"/>
    <!-- Шея -->
    <rect x="25.5" y="29" width="5" height="4" rx="1" fill="rgba(254,226,184,0.98)"/>
    <!-- Блузка под пиджаком -->
    <path d="M 22 33 L 28 39 L 34 33 L 34 44 L 22 44 Z" fill="url(#bizBlouse)"/>
