<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="bizHair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="bizJacket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="bizSkirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="bizBlouse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="64" cy="80" r="2.5" fill="#a78bfa" opacity="0.55"/>
  <circle cx="448" cy="64" r="2" fill="#22d3ee" opacity="0.55"/>
  <circle cx="420" cy="380" r="2.2" fill="#60a5fa" opacity="0.5"/>
  <g transform="translate(108,16) scale(5.3)">
    <!-- Каре узкий объём -->
    <path d="M 16 18 Q 13 30 15 42 Q 17 44 19 42 L 19 22 Z" fill="url(#bizHair)"/>
    <path d="M 40 18 Q 43 30 41 42 Q 39 44 37 42 L 37 22 Z" fill="url(#bizHair)"/>
    <!-- Голова взрослая, овальная -->
    <ellipse cx="28" cy="22" rx="8" ry="9.5" fill="#fde6cb" stroke="#1f2937" stroke-width="0.4"/>
    <!-- Чёлка набок -->
    <path d="M 20 14 Q 28 10 37 14 Q 38 18 36 22 Q 31 17 26 19 Q 22 18 21 22 Q 19 18 20 14 Z" fill="url(#bizHair)" stroke="#1f2937" stroke-width="0.3"/>
    <!-- Миндалевидные глаза -->
    <ellipse cx="25.5" cy="22" rx="1.3" ry="1.6" fill="#fff" stroke="#1f2937" stroke-width="0.3"/>
    <ellipse cx="30.5" cy="22" rx="1.3" ry="1.6" fill="#fff" stroke="#1f2937" stroke-width="0.3"/>
    <circle cx="25.5" cy="22.2" r="0.75" fill="#1f2937"/>
    <circle cx="30.5" cy="22.2" r="0.75" fill="#1f2937"/>
    <circle cx="25.7" cy="21.9" r="0.25" fill="#fff"/>
    <circle cx="30.7" cy="21.9" r="0.25" fill="#fff"/>
    <!-- Брови выразительные -->
    <path d="M 23.5 19.5 Q 25.5 18.8 27.5 19.5" stroke="#4c1d95" stroke-width="0.55" fill="none" stroke-linecap="round"/>
    <path d="M 28.5 19.5 Q 30.5 18.8 32.5 19.5" stroke="#4c1d95" stroke-width="0.55" fill="none" stroke-linecap="round"/>
    <!-- Морщинки -->
    <path d="M 23.5 22.8 Q 23 23.3 22.7 23.8" stroke="rgba(120,80,50,0.4)" stroke-width="0.22" fill="none" stroke-linecap="round"/>
    <path d="M 32.5 22.8 Q 33 23.3 33.3 23.8" stroke="rgba(120,80,50,0.4)" stroke-width="0.22" fill="none" stroke-linecap="round"/>
    <!-- Скулы -->
    <circle cx="22" cy="26" r="0.9" fill="rgba(244,114,182,0.3)"/>
    <circle cx="34" cy="26" r="0.9" fill="rgba(244,114,182,0.3)"/>
    <!-- Уверенная улыбка -->
    <path d="M 26 27.5 Q 28 28.5 30 27.5" stroke="#1f2937" stroke-width="0.45" fill="rgba(190,40,80,0.6)" stroke-linecap="round"/>
    <!-- Серьги cyan -->
    <circle cx="20" cy="25" r="0.55" fill="#22d3ee"/>
    <circle cx="36" cy="25" r="0.55" fill="#22d3ee"/>
    <!-- Шея -->
    <rect x="25.5" y="30.5" width="5" height="4" rx="1" fill="#fde6cb" stroke="#1f2937" stroke-width="0.3"/>
    <!-- Тёмный жакет (60% бренд) -->
    <path d="M 20 35 Q 18 36 18 39 L 19 57 L 37 57 L 38 39 Q 38 36 36 35 L 32 35 L 28 38 L 24 35 Z" fill="url(#bizJacket)" stroke="#1f2937" stroke-width="0.4"/>
    <!-- Воротник со светлой блузкой -->
    <path d="M 24 35 L 28 38 L 32 35 L 31 35.6 L 28 37.2 L 25 35.6 Z" fill="url(#bizBlouse)" stroke="#1f2937" stroke-width="0.3"/>
    <!-- Лацканы -->
    <path d="M 24 35 L 23 41 L 26 39 Z" fill="#1e1b4b" stroke="#1f2937" stroke-width="0.25"/>
    <path d="M 32 35 L 33 41 L 30 39 Z" fill="#1e1b4b" stroke="#1f2937" stroke-width="0.25"/>
    <!-- Пуговицы cyan -->
    <circle cx="28" cy="44" r="0.55" fill="#22d3ee"/>
    <circle cx="28" cy="50" r="0.55" fill="#22d3ee"/>
    <!-- Пояс белый -->
    <rect x="18" y="55.5" width="20" height="2" fill="#ede9fe" stroke="#1f2937" stroke-width="0.3"/>
    <rect x="27.5" y="55.5" width="1.5" height="2" fill="#7c3aed"/>
    <!-- Тёмная юбка-карандаш -->
    <path d="M 19 57 L 37 57 L 35 82 L 21 82 Z" fill="url(#bizSkirt)" stroke="#1f2937" stroke-width="0.4"/>
    <!-- Ноги -->
    <rect x="23" y="82" width="3" height="8" fill="#fde6cb" stroke="#1f2937" stroke-width="0.3"/>
    <rect x="30" y="82" width="3" height="8" fill="#fde6cb" stroke="#1f2937" stroke-width="0.3"/>
    <!-- Лодочки -->
    <path d="M 22 90 Q 24.5 89 26 90 L 26 92 L 22 92 Z" fill="#1e1b4b" stroke="#1f2937" stroke-width="0.3"/>
    <path d="M 30 90 Q 32.5 89 34 90 L 34 92 L 30 92 Z" fill="#1e1b4b" stroke="#1f2937" stroke-width="0.3"/>
    <path d="M 25 92 L 25.5 94" stroke="#1f2937" stroke-width="0.4"/>
    <path d="M 31 92 L 30.5 94" stroke="#1f2937" stroke-width="0.4"/>
    <!-- Левая рука -->
    <path d="M 19 38 Q 16 50 16 56" stroke="url(#bizJacket)" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <circle cx="16" cy="57" r="1.2" fill="#fde6cb" stroke="#1f2937" stroke-width="0.3"/>
    <rect x="14.5" y="54.5" width="3" height="1" fill="#ede9fe" stroke="#1f2937" stroke-width="0.2"/>
    <!-- Правая рука -->
    <path d="M 37 38 Q 40 32 41 25" stroke="url(#bizJacket)" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <circle cx="41" cy="24" r="1.2" fill="#fde6cb" stroke="#1f2937" stroke-width="0.3"/>
    <!-- Cyan нота -->
    <g opacity="0.85">
      <circle cx="50" cy="14" r="1" fill="#22d3ee"/>
      <line x1="50.9" y1="14" x2="50.9" y2="10" stroke="#22d3ee" stroke-width="0.5"/>
    </g>
  </g>
</svg>
