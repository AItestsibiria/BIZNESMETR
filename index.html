*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Цвета из товарного знака */
  --top:#7ECFBA;    /* верхняя грань куба — мятная */
  --left:#3DAE8C;   /* левая грань — зелёная */
  --right:#2884B8;  /* правая грань — синяя */
  /* Светлая тема */
  --bg:#F2FAF8;
  --bg1:#FFFFFF;
  --bg2:#EAF5F1;
  --bg3:#D8EDE8;
  --navy:#0B1D2E;
  --navy2:#12293F;
  --blue:#2884B8;
  --blue2:#1E70A0;
  --blue-l:rgba(40,132,184,.1);
  --green:#3DAE8C;
  --green-l:rgba(61,174,140,.1);
  --teal:#7ECFBA;
  --teal-l:rgba(126,207,186,.15);
  --border:#C8E8DF;
  --border2:#9DD4C4;
  --text:#0B1D2E;
  --text2:#3A6070;
  --text3:#7A9EAC;
  --text4:#B0C8D0;
  --gold:#C8A03C;
  --red:#E04444;
}

html{scroll-behavior:smooth}
body{
  font-family:'InstrumentSans',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
}

/* ══ DEPTH ATMOSPHERE ══ */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 60% at 80% -10%,rgba(40,132,184,.12) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at -10% 60%,rgba(61,174,140,.09) 0%,transparent 65%),
    radial-gradient(ellipse 40% 40% at 50% 110%,rgba(126,207,186,.08) 0%,transparent 60%);
}

/* Subtle grid */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(40,132,184,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(40,132,184,.04) 1px,transparent 1px);
  background-size:48px 48px;
}

/* ══ NAV ══ */
nav{
  position:fixed;top:0;left:0;right:0;z-index:500;height:64px;transition:.3s;
}
nav.solid{
  background:rgba(242,250,248,.92);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  box-shadow:0 4px 24px rgba(40,132,184,.06);
}
.nav-w{max-width:1300px;margin:0 auto;padding:0 32px;height:64px;display:flex;align-items:center;gap:32px}

/* LOGO — точная копия товарного знака */
.bm-logo{display:flex;align-items:center;gap:12px;text-decoration:none;flex-shrink:0}
.bm-logo-cube{position:relative;width:42px;height:42px}
.bm-logo svg{width:42px;height:42px;
  filter:drop-shadow(0 4px 12px rgba(40,132,184,.25)) drop-shadow(0 2px 6px rgba(61,174,140,.2));
  transition:.3s}
.bm-logo:hover svg{filter:drop-shadow(0 6px 18px rgba(40,132,184,.35)) drop-shadow(0 3px 10px rgba(61,174,140,.3));transform:translateY(-1px)}
.bm-logo-text{
  font-family:'BigShoulders-Bold',sans-serif;
  font-size:22px;letter-spacing:.06em;color:var(--navy);
  line-height:1;
}
.bm-logo-text span{color:var(--blue)}
.bm-logo-sub{
  font-family:'GeistMono-Bold',monospace;
  font-size:7px;color:var(--text3);letter-spacing:.2em;
  text-transform:uppercase;margin-top:2px;
}
.bm-logo-ai{
  font-family:'GeistMono-Bold',monospace;font-size:9px;
  background:linear-gradient(135deg,var(--blue),var(--green));
  color:#fff;padding:3px 7px;border-radius:4px;margin-left:6px;
  letter-spacing:.08em;vertical-align:2px;
}

.nav-links{display:flex;gap:2px;margin-left:auto}
.nav-a{
  height:36px;padding:0 13px;background:transparent;border:none;
  color:var(--text2);font-size:12.5px;font-family:'InstrumentSans',sans-serif;
  cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:5px;
  font-weight:500;transition:.2s;text-decoration:none;letter-spacing:.02em;
}
.nav-a:hover{background:var(--teal-l);color:var(--green)}
.nav-a i{font-size:14px}
.nav-btns{display:flex;gap:8px;margin-left:12px}
.btn-g{
  height:38px;padding:0 18px;border:1.5px solid var(--border2);border-radius:7px;
  background:transparent;color:var(--text2);font-size:13px;cursor:pointer;
  font-family:'InstrumentSans',sans-serif;font-weight:600;transition:.2s;
}
.btn-g:hover{border-color:var(--blue);color:var(--blue)}
.btn-p{
  height:38px;padding:0 20px;border:none;border-radius:7px;
  background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;
  font-size:13px;cursor:pointer;font-family:'InstrumentSans',sans-serif;font-weight:700;
  transition:.2s;box-shadow:0 4px 16px rgba(40,132,184,.28);letter-spacing:.02em;
}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(40,132,184,.38)}

/* ══ HERO ══ */
.hero{
  min-height:100vh;display:flex;align-items:center;
  padding:100px 32px 70px;position:relative;overflow:hidden;
}

/* Depth circles */
.hero-depth-1{
  position:absolute;width:700px;height:700px;border-radius:50%;
  background:radial-gradient(circle,rgba(126,207,186,.18) 0%,transparent 70%);
  top:-200px;right:-100px;pointer-events:none;
}
.hero-depth-2{
  position:absolute;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(40,132,184,.1) 0%,transparent 70%);
  bottom:-100px;left:-100px;pointer-events:none;
}

/* 3D floating cube decoration */
.hero-cube-deco{
  position:absolute;right:5%;top:50%;transform:translateY(-50%);
  opacity:.08;pointer-events:none;
  animation:float 8s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(-50%) rotate(0deg)}50%{transform:translateY(-53%) rotate(3deg)}}

.hero-inner{max-width:1300px;margin:0 auto;width:100%;position:relative;z-index:2;
  display:grid;grid-template-columns:1fr 480px;gap:80px;align-items:center}

/* LIVE BADGE */
.hero-live{
  display:inline-flex;align-items:center;gap:8px;
  font-family:'GeistMono-Bold',monospace;font-size:10px;
  color:var(--green);letter-spacing:.1em;text-transform:uppercase;
  background:var(--green-l);border:1px solid rgba(61,174,140,.25);
  padding:5px 14px;border-radius:20px;margin-bottom:28px;
}
.hero-live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:gp 2s infinite}
@keyframes gp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}

/* HERO HEADLINE */
.hero-h{
  font-family:'BigShoulders-Bold',sans-serif;
  font-size:clamp(52px,7vw,104px);
  line-height:.92;letter-spacing:-.02em;
  color:var(--navy);margin-bottom:24px;
}
.hero-h .hl-1{display:block;font-size:.55em;letter-spacing:.04em;color:var(--text3);font-family:'GeistMono-Bold',monospace;margin-bottom:8px}
.hero-h .hl-2{display:block}
.hero-h .hl-3{display:block;font-family:'IBMPlexSerif-BoldItalic',serif;font-style:italic;color:var(--blue);font-weight:400;font-size:.82em}
.hero-h .hl-4{display:block;color:var(--green)}

.hero-sub{
  font-size:17px;color:var(--text2);line-height:1.7;
  max-width:500px;margin-bottom:36px;
}
.hero-sub strong{color:var(--navy);font-family:'InstrumentSans-Bold',sans-serif}

/* COMMAND SEARCH */
.search-box{
  background:var(--bg1);border:1.5px solid var(--border);border-radius:16px;
  overflow:hidden;
  box-shadow:
    0 1px 0 rgba(255,255,255,.9) inset,
    0 20px 60px rgba(40,132,184,.12),
    0 4px 16px rgba(40,132,184,.06);
  transition:.3s;
}
.search-box:focus-within{
  border-color:var(--border2);
  box-shadow:
    0 1px 0 rgba(255,255,255,.9) inset,
    0 24px 70px rgba(40,132,184,.18),
    0 0 0 3px rgba(40,132,184,.1);
}
.sb-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2)}
.sb-tab{
  flex:1;height:42px;border:none;background:transparent;
  color:var(--text3);font-size:11.5px;font-family:'GeistMono-Bold',monospace;
  cursor:pointer;transition:.2s;letter-spacing:.08em;display:flex;align-items:center;justify-content:center;gap:6px;
  border-bottom:2px solid transparent;
}
.sb-tab:hover{color:var(--text);background:rgba(255,255,255,.5)}
.sb-tab.on{color:var(--blue);background:var(--bg1);border-bottom-color:var(--blue)}
.sb-tab i{font-size:14px}
.sb-body{padding:20px 22px}
.sb-prompt{display:flex;gap:10px;align-items:flex-start}
.sb-cursor{
  font-family:'GeistMono-Bold',monospace;font-size:16px;
  color:var(--green);flex-shrink:0;margin-top:4px;
  animation:blink .9s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.sb-textarea{
  flex:1;background:transparent;border:none;outline:none;
  font-size:16px;color:var(--navy);font-family:'InstrumentSans',sans-serif;
  resize:none;min-height:52px;max-height:160px;line-height:1.6;
  caret-color:var(--green);
}
.sb-textarea::placeholder{color:var(--text4)}
.sb-footer{
  padding:12px 22px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:var(--bg2);
}
.sb-chips{display:flex;gap:6px;flex-wrap:wrap}
.sb-chip{
  font-size:11px;padding:4px 11px;background:var(--bg1);
  border:1px solid var(--border);border-radius:20px;
  color:var(--text3);cursor:pointer;transition:.2s;
  font-family:'InstrumentSans',sans-serif;
}
.sb-chip:hover{border-color:var(--green);color:var(--green);background:var(--green-l)}
.sb-send{
  height:38px;padding:0 20px;
  background:linear-gradient(135deg,var(--blue),var(--green));
  color:#fff;border:none;border-radius:8px;
  font-family:'GeistMono-Bold',monospace;font-size:11px;
  cursor:pointer;letter-spacing:.08em;display:flex;align-items:center;gap:7px;
  transition:.2s;flex-shrink:0;
  box-shadow:0 4px 16px rgba(40,132,184,.28);
}
.sb-send:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(40,132,184,.4)}
.sb-send i{font-size:14px}

/* STREAM */
.stream{margin-top:16px;display:none;flex-direction:column;gap:10px}
.stream.on{display:flex}
.s-q{
  font-size:13px;color:var(--blue);padding:8px 14px;
  background:var(--blue-l);border-left:2px solid var(--blue);
  border-radius:0 6px 6px 0;font-family:'InstrumentSans-Bold',sans-serif;
}
.s-a{
  background:var(--bg1);border:1px solid var(--border);border-radius:10px;
  padding:14px 18px;font-size:14px;color:var(--text);line-height:1.7;
  box-shadow:0 2px 12px rgba(40,132,184,.08);
}
.typing{display:inline-flex;gap:5px;align-items:center}
.typing s{width:7px;height:7px;background:var(--green);border-radius:50%;animation:tp 1.2s infinite;text-decoration:none}
.typing s:nth-child(2){animation-delay:.2s}
.typing s:nth-child(3){animation-delay:.4s}
@keyframes tp{0%,80%,100%{opacity:.2;transform:scale(.65)}40%{opacity:1;transform:scale(1)}}

/* ══ HERO RIGHT — DATA CARDS WITH DEPTH ══ */
.hero-cards{display:flex;flex-direction:column;gap:12px;position:relative}

/* 3D depth layering */
.hero-cards::before{
  content:'';position:absolute;inset:-20px;
  background:radial-gradient(ellipse at 50% 30%,rgba(126,207,186,.15) 0%,transparent 70%);
  pointer-events:none;
}
.data-card{
  background:var(--bg1);border:1.5px solid var(--border);border-radius:12px;
  padding:18px 22px;display:flex;justify-content:space-between;align-items:center;
  transition:.3s;cursor:default;position:relative;overflow:hidden;
  box-shadow:0 2px 0 rgba(255,255,255,.9) inset,0 4px 20px rgba(40,132,184,.07);
}
.data-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--teal),var(--blue));
  border-radius:3px 0 0 3px;
}
.data-card:hover{
  transform:translateX(-4px);

}
