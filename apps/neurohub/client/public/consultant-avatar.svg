    <ellipse cx="28" cy="22" rx="6" ry="8" fill="rgba(254,226,184,0.98)"/>
    <!-- Открытые глаза -->
    <circle cx="25.5" cy="22" r="0.7" fill="rgba(40,30,20,0.92)"/>
    <circle cx="30.5" cy="22" r="0.7" fill="rgba(40,30,20,0.92)"/>
    <!-- Брови светлые -->
