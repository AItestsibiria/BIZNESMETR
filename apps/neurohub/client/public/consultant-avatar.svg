    <path d="M 18 11 Q 28 7 38 11 Q 39 22 36 26 Q 28 17 20 26 Q 17 22 18 11 Z" fill="url(#bizHair)"/>
    <!-- Лицо ~30 -->
    <ellipse cx="28" cy="22" rx="6" ry="8" fill="rgba(254,226,184,0.98)"/>
    <!-- Глаза -->
    <circle cx="25.5" cy="22" r="0.7" fill="rgba(40,30,20,0.92)"/>
    <circle cx="30.5" cy="22" r="0.7" fill="rgba(40,30,20,0.92)"/>
    <!-- Морщинки у глаз -->
    <path d="M 23.5 22.5 Q 23 23 22.8 23.5" stroke="rgba(150,110,80,0.4)" stroke-width="0.25" fill="none" stroke-linecap="round"/>
    <path d="M 32.5 22.5 Q 33 23 33.2 23.5" stroke="rgba(150,110,80,0.4)" stroke-width="0.25" fill="none" stroke-linecap="round"/>
    <!-- Брови лавандовые -->
    <path d="M 24 20 Q 26 19.5 27 20" stroke="rgba(139,92,246,0.8)" stroke-width="0.4" fill="none" stroke-linecap="round"/>
    <path d="M 29 20 Q 30 19.5 32 20" stroke="rgba(139,92,246,0.8)" stroke-width="0.4" fill="none" stroke-linecap="round"/>
    <!-- Улыбка -->
    <path d="M 26 27 Q 28 28.5 30 27" stroke="rgba(180,60,80,0.92)" stroke-width="0.6" fill="none" stroke-linecap="round"/>
    <!-- Щёчки -->
    <circle cx="23" cy="25" r="0.9" fill="rgba(244,114,182,0.4)"/>
    <circle cx="33" cy="25" r="0.9" fill="rgba(244,114,182,0.4)"/>
    <!-- Серьги -->
    <circle cx="22" cy="24" r="0.5" fill="rgba(167,139,250,0.95)"/>
    <circle cx="34" cy="24" r="0.5" fill="rgba(167,139,250,0.95)"/>
    <!-- Шея -->
    <rect x="25.5" y="29" width="5" height="4" rx="1" fill="rgba(254,226,184,0.98)"/>
    <!-- Блузка -->
    <path d="M 22 33 L 28 39 L 34 33 L 34 45 L 22 45 Z" fill="url(#bizBlouse)"/>
    <!-- Полуделовой жакет (открытый, без лацканов) -->
