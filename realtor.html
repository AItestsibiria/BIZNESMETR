<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Бизнесметр AI — Риелтор</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
/* ═══════════════════════════════════════
   БИЗНЕСМЕТР AI — ЕДИНАЯ ДИЗАЙН-СИСТЕМА
   Применяется на всех страницах
═══════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Цвета */
  --navy:#0A1A35;
  --navy2:#142547;
  --blue:#1D5BD3;
  --blue2:#2A6DD9;
  --blue-bright:#3E7DEE;
  --blue-light:#5B9BF5;
  --blue-xlight:rgba(29,91,211,.08);
  --teal:#10A89A;
  --teal-light:rgba(16,168,154,.12);
  --bg:#EDF3FE;
  --bg-card:#FFFFFF;
  --bg-elevated:#F0F5FD;
  --bg-deep:#E4EDFF;
  --border:#C9DAEF;
  --border2:#A8C2EE;
  --text:#0A1A35;
  --text2:#2D4870;
  --text3:#6B89B0;
  --text4:#9AB3D0;
  --green:#1A9E6A;
  --amber:#F5A623;
  --red:#E54444;
  /* Типографика */
  --font-display:'Bricolage Grotesque',sans-serif;
  --font-serif:'Instrument Serif',serif;
  --font-body:'Manrope',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  /* Радиусы */
  --r:14px; --rs:10px; --rxs:6px;
}

html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);overflow-x:hidden}

/* MESH BG */
.bm-bg::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 65% 55% at 75% -5%,rgba(29,91,211,.15),transparent 60%),
    radial-gradient(ellipse 45% 40% at -5% 40%,rgba(16,168,154,.09),transparent 65%),
    radial-gradient(circle at 1px 1px,rgba(29,91,211,.055) 1px,transparent 0);
  background-size:100% 100%,100% 100%,28px 28px;
}

/* ── NAV ── */
.bm-nav{position:fixed;top:0;left:0;right:0;z-index:200;height:66px;transition:.3s}
.bm-nav.solid{background:rgba(237,243,254,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.bm-nav-inner{max-width:1320px;margin:0 auto;padding:0 28px;height:66px;display:flex;align-items:center;gap:28px}
.bm-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.bm-logo-text{font-family:var(--font-display);font-weight:800;font-size:18px;letter-spacing:-.02em;color:var(--navy)}
.bm-logo-text b{color:var(--blue)}
.bm-logo-ai{font-size:9px;background:var(--blue);color:#fff;padding:3px 7px;border-radius:4px;margin-left:5px;font-weight:800;letter-spacing:.06em}
.bm-nav-links{display:flex;gap:2px;margin-left:auto}
.bm-nav-link{height:36px;padding:0 13px;background:transparent;border:none;color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--font-body);border-radius:8px;display:flex;align-items:center;gap:5px;font-weight:500;transition:.2s;text-decoration:none}
.bm-nav-link:hover,.bm-nav-link.active{background:var(--blue-xlight);color:var(--blue)}
.bm-nav-link i{font-size:14px}
.bm-nav-link.active{border-bottom:2px solid var(--blue);border-radius:8px 8px 0 0}
.bm-nav-cta{display:flex;gap:8px;margin-left:10px}

/* ── КНОПКИ ── */
.btn-primary{height:42px;padding:0 22px;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);font-size:13.5px;font-weight:700;cursor:pointer;font-family:var(--font-body);display:inline-flex;align-items:center;gap:7px;transition:.2s;box-shadow:0 4px 16px rgba(29,91,211,.3)}
.btn-primary:hover{background:#1548B5;transform:translateY(-1px);box-shadow:0 8px 24px rgba(29,91,211,.4)}
.btn-ghost{height:42px;padding:0 18px;background:transparent;border:1.5px solid var(--border2);color:var(--text2);border-radius:var(--rs);font-size:13.5px;font-weight:600;cursor:pointer;font-family:var(--font-body);display:inline-flex;align-items:center;gap:7px;transition:.2s;text-decoration:none}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-sm{height:34px;padding:0 14px;font-size:12.5px}

/* ── КАРТОЧКИ ── */
.bm-card{background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--r);transition:.25s}
.bm-card:hover{border-color:var(--border2);box-shadow:0 8px 32px rgba(29,91,211,.1)}
.bm-card-dark{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);transition:.25s}
.bm-card-dark:hover{background:rgba(62,125,238,.08);border-color:rgba(62,125,238,.35)}

/* ── ИНПУТЫ ── */
.bm-input{background:var(--bg-elevated);border:1.5px solid transparent;border-radius:var(--rs);padding:10px 16px;font-size:14px;font-family:var(--font-body);color:var(--text);outline:none;width:100%;transition:.2s}
.bm-input:focus{border-color:var(--blue);background:var(--bg-card)}
.bm-input::placeholder{color:var(--text4)}
.bm-select{background:var(--bg-elevated);border:1.5px solid var(--border);border-radius:var(--rs);padding:0 14px;height:40px;font-size:13.5px;font-family:var(--font-body);color:var(--text);outline:none;cursor:pointer;transition:.2s}
.bm-select:focus{border-color:var(--blue)}

/* ── BADGES ── */
.bm-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600;font-family:var(--font-mono)}
.bm-badge-blue{background:var(--blue-xlight);color:var(--blue);border:1px solid rgba(29,91,211,.18)}
.bm-badge-teal{background:var(--teal-light);color:var(--teal);border:1px solid rgba(16,168,154,.25)}
.bm-badge-green{background:rgba(26,158,106,.1);color:var(--green);border:1px solid rgba(26,158,106,.25)}
.bm-badge-red{background:rgba(229,68,68,.1);color:var(--red);border:1px solid rgba(229,68,68,.2)}
.bm-badge-live{background:rgba(16,168,154,.1);color:var(--teal);border:1px solid rgba(16,168,154,.3)}
.bm-badge-live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--teal);animation:lp 2s infinite}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.3}}

/* ── СЕКЦИИ ── */
.bm-section{padding:80px 28px;position:relative;z-index:1}
.bm-wrap{max-width:1320px;margin:0 auto}
.bm-s-tag{display:inline-flex;align-items:center;gap:8px;font-size:11px;color:var(--blue);font-weight:700;letter-spacing:.15em;text-transform:uppercase;margin-bottom:16px;font-family:var(--font-mono)}
.bm-s-tag::before{content:'';width:20px;height:1.5px;background:var(--blue)}
.bm-s-h{font-family:var(--font-display);font-size:clamp(32px,5vw,56px);font-weight:800;letter-spacing:-.03em;line-height:1.06;color:var(--navy);margin-bottom:14px}
.bm-s-h em{font-style:italic;font-family:var(--font-serif);color:var(--blue);font-weight:400}
.bm-s-sub{font-size:16px;color:var(--text2);line-height:1.65;max-width:580px}

/* ── ANIMATIONS ── */
.bm-reveal{opacity:0;transform:translateY(24px);transition:opacity .85s cubic-bezier(.16,1,.3,1),transform .85s cubic-bezier(.16,1,.3,1)}
.bm-reveal.in{opacity:1;transform:none}
.bm-reveal-l{opacity:0;transform:translateX(-20px);transition:opacity .75s cubic-bezier(.16,1,.3,1),transform .75s cubic-bezier(.16,1,.3,1)}
.bm-reveal-l.in{opacity:1;transform:none}

/* ── DARK SECTION ── */
.bm-dark{background:var(--navy);color:#fff}
.bm-dark .bm-s-tag{color:var(--blue-light)}
.bm-dark .bm-s-tag::before{background:var(--blue-light)}
.bm-dark .bm-s-h{color:#fff}
.bm-dark .bm-s-h em{color:var(--blue-light)}

/* TYPING ANIMATION */
.bm-typing{display:inline-flex;gap:5px;align-items:center}
.bm-typing s{width:8px;height:8px;background:var(--blue);border-radius:50%;animation:btyp 1.2s infinite;text-decoration:none}
.bm-typing s:nth-child(2){animation-delay:.2s}
.bm-typing s:nth-child(3){animation-delay:.4s}
@keyframes btyp{0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:768px){.bm-nav-links{display:none}}

html,body{height:100%;overflow:hidden}
body{display:flex;flex-direction:column}

/* HEADER */
.rt-header{background:var(--bg-card);border-bottom:1.5px solid var(--border);padding:0 20px;height:66px;display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:0 2px 12px rgba(29,91,211,.06)}
.rt-agent-ava{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:16px;color:#fff;flex-shrink:0;position:relative}
.rt-agent-ava::after{content:'';position:absolute;bottom:0;right:0;width:10px;height:10px;background:var(--green);border-radius:50%;border:2px solid var(--bg-card)}
.rt-agent-info{flex:1}
.rt-agent-name{font-family:var(--font-display);font-weight:800;font-size:15px;color:var(--navy);letter-spacing:-.01em}
.rt-agent-status{font-size:11.5px;color:var(--green);display:flex;align-items:center;gap:4px;font-weight:600}
.rt-agent-status::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;animation:lp 2s infinite}
.rt-stats{display:flex;gap:20px;margin-left:auto}
.rt-stat{text-align:right}
.rt-stat-v{font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--navy);line-height:1}
.rt-stat-l{font-size:10px;color:var(--text4);font-family:var(--font-mono)}

/* STATS BAR */
.rt-statsbar{background:var(--bg-elevated);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:24px;overflow-x:auto;flex-shrink:0}
.rt-statsbar::-webkit-scrollbar{display:none}
.rt-sb{display:flex;flex-direction:column;white-space:nowrap}
.rt-sb-v{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--text);line-height:1.2}
.rt-sb-l{font-size:10px;color:var(--text4);font-family:var(--font-mono)}

/* MESSAGES */
.rt-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.rt-msgs::-webkit-scrollbar{width:4px}
.rt-msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.msg-user{display:flex;justify-content:flex-end}
.msg-user-bub{background:var(--blue);color:#fff;padding:11px 17px;border-radius:17px 4px 17px 17px;font-size:14.5px;max-width:70%;font-weight:500;line-height:1.5}
.msg-ai{display:flex;gap:10px;align-items:flex-start;max-width:88%}
.ai-ava{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:12px;color:#fff;flex-shrink:0;margin-top:2px}
.ai-bub{background:var(--bg-card);border:1.5px solid var(--border);border-radius:4px 17px 17px 17px;padding:13px 17px;font-size:14.5px;color:var(--text);line-height:1.65;box-shadow:0 2px 12px rgba(29,91,211,.06)}
.sys-note{text-align:center;font-size:11px;color:var(--text4);font-family:var(--font-mono);padding:4px 0}

/* PROPERTY CARDS */
.prop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-top:10px}
.prop-mini{background:var(--bg-elevated);border:1.5px solid var(--border);border-radius:var(--rs);overflow:hidden;cursor:pointer;transition:.2s}
.prop-mini:hover{border-color:var(--blue);transform:translateY(-2px)}
.pm-img{height:90px;background:var(--bg-deep);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--border2);position:relative}
.pm-badge{position:absolute;top:6px;right:6px}
.pm-body{padding:10px 12px}
.pm-title{font-family:var(--font-display);font-size:12.5px;font-weight:700;color:var(--navy);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pm-price{font-family:var(--font-display);font-size:15px;font-weight:800;color:var(--blue);margin-bottom:4px}
.pm-meta{font-size:10.5px;color:var(--text3);display:flex;gap:6px}
.pm-actions{display:flex;gap:5px;margin-top:7px}
.pm-btn{flex:1;height:26px;border:1px solid var(--border);border-radius:var(--rxs);background:transparent;color:var(--text2);font-size:10.5px;cursor:pointer;transition:.2s;font-family:var(--font-body)}
.pm-btn:hover{border-color:var(--blue);color:var(--blue)}
.pm-btn.prim{background:var(--blue);color:#fff;border-color:var(--blue)}

/* QUICK REPLIES */
.qr-chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.qr-chip{font-size:12px;padding:6px 13px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:20px;color:var(--text2);cursor:pointer;transition:.2s;font-family:var(--font-body)}
.qr-chip:hover{border-color:var(--blue);color:var(--blue)}

/* INPUT */
.rt-input-area{padding:12px 20px;background:var(--bg-card);border-top:1.5px solid var(--border);flex-shrink:0}
.rt-input-row{display:flex;gap:8px;align-items:flex-end}
.rt-input-wrap{flex:1;background:var(--bg-elevated);border:1.5px solid var(--border);border-radius:var(--r);padding:11px 15px;display:flex;gap:8px;align-items:flex-end;transition:.2s}
.rt-input-wrap:focus-within{border-color:var(--blue);background:var(--bg-card)}
.rt-textarea{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--text);font-family:var(--font-body);resize:none;min-height:24px;max-height:80px;line-height:1.5}
.rt-textarea::placeholder{color:var(--text4)}
.rt-send{width:42px;height:42px;background:var(--blue);border:none;border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;transition:.2s;flex-shrink:0}
.rt-send:hover{background:#1548B5}
.rt-mic{width:42px;height:42px;background:var(--bg-elevated);border:1.5px solid var(--border);border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:.2s;flex-shrink:0}
.rt-mic:hover{border-color:var(--blue);color:var(--blue)}
.rt-mic.rec{background:rgba(229,68,68,.1);border-color:var(--red);color:var(--red);animation:recpulse 1s infinite}
@keyframes recpulse{0%,100%{opacity:1}50%{opacity:.6}}
.rt-hint{font-size:11px;color:var(--text4);margin-top:6px;text-align:center;font-family:var(--font-mono)}

@media(max-width:600px){
  .rt-stats{display:none}
  .prop-grid{grid-template-columns:1fr}
}

@keyframes fadeup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.msg-user,.msg-ai,.sys-note{animation:fadeup .3s ease}
</style>
</head>

  {id:13,type:'торговое',title:'Ресторан Патриаршие',area:200,price:960000,deal:'аренда',district:'ЦАО',metro:'Маяковская',floor:1,class:'—',icon:'🍽'},
  {id:14,type:'офис',title:'Офис Кутузовский',area:70,price:245000,deal:'аренда',district:'ЗАО',metro:'Кутузовская',floor:4,class:'B+',icon:'🏢'},
  {id:15,type:'склад',title:'Склад Подольск',area:3500,price:1050000,deal:'аренда',district:'МО',metro:'—',floor:1,class:'A',icon:'🏭'},
];

const SYSTEM='Ты Алекс — AI-риелтор Бизнесметра. База объектов (JSON): '+JSON.stringify(DB.map(p=>({id:p.id,type:p.type,title:p.title,area:p.area,price:p.price,deal:p.deal,district:p.district,metro:p.metro})))+'. Правила: 1)Отвечай кратко (до 120 слов) как живой риелтор. 2)При нахождении объектов укажи [IDS:1,2,3]. 3)Форматируй цены красиво. 4)Только русский, без markdown.';

let history=[],busy=false,recog=null,recording=false;

function searchDB(q){
  const m=q.toLowerCase();let r=[...DB];
  if(m.includes('офис'))r=r.filter(p=>p.type==='офис');
  else if(m.includes('склад'))r=r.filter(p=>p.type==='склад');
  else if(m.includes('торгов')||m.includes('магазин'))r=r.filter(p=>p.type==='торговое');
  else if(m.includes('производ')||m.includes('цех'))r=r.filter(p=>p.type==='производство');
  if(m.includes('аренд')||m.includes('снять'))r=r.filter(p=>p.deal==='аренда');
  else if(m.includes('купить')||m.includes('покупк')||m.includes('продаж'))r=r.filter(p=>p.deal==='продажа');
  ['ЦАО','ЮВАО','ЗАО','ЮАО','СВАО','МО'].forEach(d=>{if(m.includes(d.toLowerCase())||m.includes(d))r=r.filter(p=>p.district===d);});
  if(m.includes('центр'))r=r.filter(p=>p.district==='ЦАО');
  document.getElementById('cnt-found').textContent=r.length;
  return r.slice(0,6);
}

async function callAI(text){
  history.push({role:'user',content:text});
  try{
    const r=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:SYSTEM,messages:history.slice(-10),max_tokens:500})});
    const d=await r.json();
    if(d?.content?.[0]?.text){const t=d.content[0].text;history.push({role:'assistant',content:t});return t;}
  }catch(e){}
  return null;
}

async function send(){
  const inp=document.getElementById('inp');const txt=inp.value.trim();
  if(!txt||busy)return;
  busy=true;document.querySelector('.rt-send').disabled=true;
  inp.value='';inp.style.height='auto';
  addUserMsg(txt);
  const loader=addTyping();
  const aiText=await callAI(txt);
  loader.remove();
  if(aiText){
    const idMatch=aiText.match(/\[IDS:([\d,]+)\]/);
    const ids=idMatch?idMatch[1].split(',').map(Number):[];
    const clean=aiText.replace(/\[IDS:[\d,]+\]/,'').trim();
    addAiMsg(clean,ids);
    if(window.speechSynthesis){const u=new SpeechSynthesisUtterance(clean.slice(0,200));u.lang='ru-RU';window.speechSynthesis.speak(u);}
  } else {
    const found=searchDB(txt);
    const text=found.length?'Нашёл '+found.length+' вариантов по вашему запросу:':'Попробуйте уточнить — укажите тип, район или площадь.';
    addAiMsg(text,found.map(p=>p.id),[]);
  }
  busy=false;document.querySelector('.rt-send').disabled=false;
}

function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Голосовой ввод недоступен');return;}
  if(recording){recog?.stop();recording=false;document.getElementById('mic-btn').classList.remove('rec');return;}
  recog=new SR();recog.lang='ru-RU';recog.interimResults=true;
  recog.onresult=e=>{const t=[...e.results].map(r=>r[0].transcript).join('');document.getElementById('inp').value=t;if(e.results[e.results.length-1].isFinal){recording=false;document.getElementById('mic-btn').classList.remove('rec');send();}};
  recog.start();recording=true;document.getElementById('mic-btn').classList.add('rec');
}

const msgs=document.getElementById('msgs');
const scroll=()=>setTimeout(()=>msgs.scrollTop=msgs.scrollHeight,60);
function mk(h){const d=document.createElement('div');d.innerHTML=h;return d.firstChild;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPrice(p,deal){if(p>=1e6)return(p/1e6).toFixed(1).replace('.0','')+'M₽'+(deal==='аренда'?'/мес':'');return p.toLocaleString('ru')+'₽'+(deal==='аренда'?'/мес':'');}

function addUserMsg(t){msgs.appendChild(mk('<div class="msg-user"><div class="msg-user-bub">'+esc(t)+'</div></div>'));scroll();}
function addTyping(){const d=mk('<div class="msg-ai"><div class="ai-ava">А</div><div class="ai-bub"><div class="bm-typing"><s></s><s></s><s></s></div></div></div>');msgs.appendChild(d);scroll();return d;}
function addAiMsg(text,ids=[],qr=[]){
  const cards=ids.length?renderCards(ids):'';
  const chips=qr.length?'<div class="qr-chips">'+qr.map(q=>'<span class="qr-chip" onclick="document.getElementById(\'inp\').value=\''+q+'\';send()">'+q+'</span>').join('')+'</div>':'';
  msgs.appendChild(mk('<div class="msg-ai"><div class="ai-ava">А</div><div class="ai-bub"><div>'+esc(text)+'</div>'+cards+chips+'</div></div>'));scroll();
}
function renderCards(ids){
  const items=ids.map(id=>DB.find(p=>p.id===id)).filter(Boolean);
  if(!items.length)return '';
  return '<div class="prop-grid">'+items.map(p=>'<div class="prop-mini"><div class="pm-img">'+p.icon+'<div class="pm-badge"><span class="bm-badge '+(p.deal==='аренда'?'bm-badge-blue':'bm-badge-teal')+'">'+p.deal+'</span></div></div><div class="pm-body"><div class="pm-title">'+esc(p.title)+'</div><div class="pm-price">'+fmtPrice(p.price,p.deal)+'</div><div class="pm-meta"><span><i class="ti ti-ruler-2" style="font-size:11px"></i>'+p.area+'м²</span><span><i class="ti ti-map-pin" style="font-size:11px"></i>'+p.district+'</span></div><div class="pm-actions"><button class="pm-btn">Детали</button><button class="pm-btn prim">Записаться</button></div></div></div>').join('')+'</div>';
}

// AUTO SIZE
document.getElementById('inp').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'});

// WELCOME
setTimeout(()=>{
  msgs.appendChild(mk('<div class="sys-note">Алекс онлайн · база '+DB.length+' объектов</div>'));
  addAiMsg('Привет! Я Алекс, AI-риелтор Бизнесметра. Помогу найти коммерческую недвижимость в Москве — офис, склад, торговое, производство.',[],[
    'Офис в центре до 300 тыс',
    'Склад от 500 м²',
    'Торговое аренда',
    'Купить офис ЦАО'
  ]);
  document.getElementById('cnt-obj').textContent=DB.length;
},300);
</script>
