<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="bizJacket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(196,181,253,0.98)"/>
      <stop offset="100%" stop-color="rgba(147,197,253,0.95)"/>
    </linearGradient>
    <linearGradient id="bizBlouse" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(254,243,199,0.98)"/>
      <stop offset="100%" stop-color="rgba(253,224,153,0.92)"/>
    </linearGradient>
    <linearGradient id="bizHair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(196,181,253,0.98)"/>
      <stop offset="100%" stop-color="rgba(96,165,250,0.95)"/>
    </linearGradient>
    <linearGradient id="bizTrousers" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(167,139,250,0.95)"/>
      <stop offset="100%" stop-color="rgba(124,58,237,0.90)"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="64" cy="80" r="2" fill="#a78bfa" opacity="0.55"/>
  <circle cx="448" cy="64" r="1.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="80" cy="420" r="1.8" fill="#a78bfa" opacity="0.45"/>
  <g transform="translate(108,16) scale(5.3)">
