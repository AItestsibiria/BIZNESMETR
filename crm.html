<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Бизнесметр AI — CRM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
/* ═══════════════════════════════════════
   БИЗНЕСМЕТР AI — ЕДИНАЯ ДИЗАЙН-СИСТЕМА
   Применяется на всех страницах
═══════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Цвета */
  --navy:#0A1A35;
  --navy2:#142547;
  --blue:#1D5BD3;
  --blue2:#2A6DD9;
  --blue-bright:#3E7DEE;
  --blue-light:#5B9BF5;
  --blue-xlight:rgba(29,91,211,.08);
  --teal:#10A89A;
  --teal-light:rgba(16,168,154,.12);
  --bg:#EDF3FE;
  --bg-card:#FFFFFF;
  --bg-elevated:#F0F5FD;
  --bg-deep:#E4EDFF;
  --border:#C9DAEF;
  --border2:#A8C2EE;
  --text:#0A1A35;
  --text2:#2D4870;
  --text3:#6B89B0;
  --text4:#9AB3D0;
  --green:#1A9E6A;
  --amber:#F5A623;
  --red:#E54444;
  /* Типографика */
  --font-display:'Bricolage Grotesque',sans-serif;
  --font-serif:'Instrument Serif',serif;
  --font-body:'Manrope',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  /* Радиусы */
  --r:14px; --rs:10px; --rxs:6px;
}

html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);overflow-x:hidden}

/* MESH BG */
.bm-bg::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 65% 55% at 75% -5%,rgba(29,91,211,.15),transparent 60%),
    radial-gradient(ellipse 45% 40% at -5% 40%,rgba(16,168,154,.09),transparent 65%),
    radial-gradient(circle at 1px 1px,rgba(29,91,211,.055) 1px,transparent 0);
  background-size:100% 100%,100% 100%,28px 28px;
}

/* ── NAV ── */
.bm-nav{position:fixed;top:0;left:0;right:0;z-index:200;height:66px;transition:.3s}
.bm-nav.solid{background:rgba(237,243,254,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.bm-nav-inner{max-width:1320px;margin:0 auto;padding:0 28px;height:66px;display:flex;align-items:center;gap:28px}
.bm-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.bm-logo-text{font-family:var(--font-display);font-weight:800;font-size:18px;letter-spacing:-.02em;color:var(--navy)}
.bm-logo-text b{color:var(--blue)}
.bm-logo-ai{font-size:9px;background:var(--blue);color:#fff;padding:3px 7px;border-radius:4px;margin-left:5px;font-weight:800;letter-spacing:.06em}
.bm-nav-links{display:flex;gap:2px;margin-left:auto}
.bm-nav-link{height:36px;padding:0 13px;background:transparent;border:none;color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--font-body);border-radius:8px;display:flex;align-items:center;gap:5px;font-weight:500;transition:.2s;text-decoration:none}
.bm-nav-link:hover,.bm-nav-link.active{background:var(--blue-xlight);color:var(--blue)}
.bm-nav-link i{font-size:14px}
.bm-nav-link.active{border-bottom:2px solid var(--blue);border-radius:8px 8px 0 0}
.bm-nav-cta{display:flex;gap:8px;margin-left:10px}

/* ── КНОПКИ ── */
.btn-primary{height:42px;padding:0 22px;background:var(--blue);color:#fff;border:none;border-radius:var(--rs);font-size:13.5px;font-weight:700;cursor:pointer;font-family:var(--font-body);display:inline-flex;align-items:center;gap:7px;transition:.2s;box-shadow:0 4px 16px rgba(29,91,211,.3)}
.btn-primary:hover{background:#1548B5;transform:translateY(-1px);box-shadow:0 8px 24px rgba(29,91,211,.4)}
.btn-ghost{height:42px;padding:0 18px;background:transparent;border:1.5px solid var(--border2);color:var(--text2);border-radius:var(--rs);font-size:13.5px;font-weight:600;cursor:pointer;font-family:var(--font-body);display:inline-flex;align-items:center;gap:7px;transition:.2s;text-decoration:none}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-sm{height:34px;padding:0 14px;font-size:12.5px}

/* ── КАРТОЧКИ ── */
.bm-card{background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--r);transition:.25s}
.bm-card:hover{border-color:var(--border2);box-shadow:0 8px 32px rgba(29,91,211,.1)}
.bm-card-dark{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);transition:.25s}
.bm-card-dark:hover{background:rgba(62,125,238,.08);border-color:rgba(62,125,238,.35)}

/* ── ИНПУТЫ ── */
.bm-input{background:var(--bg-elevated);border:1.5px solid transparent;border-radius:var(--rs);padding:10px 16px;font-size:14px;font-family:var(--font-body);color:var(--text);outline:none;width:100%;transition:.2s}
.bm-input:focus{border-color:var(--blue);background:var(--bg-card)}
.bm-input::placeholder{color:var(--text4)}
.bm-select{background:var(--bg-elevated);border:1.5px solid var(--border);border-radius:var(--rs);padding:0 14px;height:40px;font-size:13.5px;font-family:var(--font-body);color:var(--text);outline:none;cursor:pointer;transition:.2s}
.bm-select:focus{border-color:var(--blue)}

/* ── BADGES ── */
.bm-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600;font-family:var(--font-mono)}
.bm-badge-blue{background:var(--blue-xlight);color:var(--blue);border:1px solid rgba(29,91,211,.18)}
.bm-badge-teal{background:var(--teal-light);color:var(--teal);border:1px solid rgba(16,168,154,.25)}
.bm-badge-green{background:rgba(26,158,106,.1);color:var(--green);border:1px solid rgba(26,158,106,.25)}
.bm-badge-red{background:rgba(229,68,68,.1);color:var(--red);border:1px solid rgba(229,68,68,.2)}
.bm-badge-live{background:rgba(16,168,154,.1);color:var(--teal);border:1px solid rgba(16,168,154,.3)}
.bm-badge-live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--teal);animation:lp 2s infinite}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.3}}

/* ── СЕКЦИИ ── */
.bm-section{padding:80px 28px;position:relative;z-index:1}
.bm-wrap{max-width:1320px;margin:0 auto}
.bm-s-tag{display:inline-flex;align-items:center;gap:8px;font-size:11px;color:var(--blue);font-weight:700;letter-spacing:.15em;text-transform:uppercase;margin-bottom:16px;font-family:var(--font-mono)}
.bm-s-tag::before{content:'';width:20px;height:1.5px;background:var(--blue)}
.bm-s-h{font-family:var(--font-display);font-size:clamp(32px,5vw,56px);font-weight:800;letter-spacing:-.03em;line-height:1.06;color:var(--navy);margin-bottom:14px}
.bm-s-h em{font-style:italic;font-family:var(--font-serif);color:var(--blue);font-weight:400}
.bm-s-sub{font-size:16px;color:var(--text2);line-height:1.65;max-width:580px}

/* ── ANIMATIONS ── */
.bm-reveal{opacity:0;transform:translateY(24px);transition:opacity .85s cubic-bezier(.16,1,.3,1),transform .85s cubic-bezier(.16,1,.3,1)}
.bm-reveal.in{opacity:1;transform:none}
.bm-reveal-l{opacity:0;transform:translateX(-20px);transition:opacity .75s cubic-bezier(.16,1,.3,1),transform .75s cubic-bezier(.16,1,.3,1)}
.bm-reveal-l.in{opacity:1;transform:none}

/* ── DARK SECTION ── */
.bm-dark{background:var(--navy);color:#fff}
.bm-dark .bm-s-tag{color:var(--blue-light)}
.bm-dark .bm-s-tag::before{background:var(--blue-light)}
.bm-dark .bm-s-h{color:#fff}
.bm-dark .bm-s-h em{color:var(--blue-light)}

/* TYPING ANIMATION */
.bm-typing{display:inline-flex;gap:5px;align-items:center}
.bm-typing s{width:8px;height:8px;background:var(--blue);border-radius:50%;animation:btyp 1.2s infinite;text-decoration:none}
.bm-typing s:nth-child(2){animation-delay:.2s}
.bm-typing s:nth-child(3){animation-delay:.4s}
@keyframes btyp{0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1)}}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:768px){.bm-nav-links{display:none}}

/* ── CRM SPECIFIC ── */
html,body{height:100%;overflow:hidden}
#login-screen{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px}
.login-card{background:var(--bg-card);border:1.5px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 16px 60px rgba(29,91,211,.12)}
.login-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(29,91,211,.08),transparent 70%);pointer-events:none}
.login-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
.login-title{font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--navy);text-align:center;letter-spacing:-.02em;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px}
.login-label{font-size:11.5px;color:var(--text3);font-weight:600;font-family:var(--font-mono);letter-spacing:.06em;display:block;margin-bottom:6px}
.login-field{margin-bottom:14px}
.login-err{background:rgba(229,68,68,.08);border:1px solid rgba(229,68,68,.2);border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--red);display:none;margin-bottom:14px}
.login-demo{text-align:center;margin-top:14px;font-size:12.5px;color:var(--text3)}
.login-demo a{color:var(--blue);cursor:pointer;font-weight:600;text-decoration:none}

#app-screen{display:none;flex-direction:column;height:100%;position:relative;z-index:1}

/* APP TOP BAR */
.app-bar{height:60px;background:var(--bg-card);border-bottom:1.5px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0}
.app-bar .bm-logo-text{font-size:16px}
.app-tabs{display:flex;gap:2px;margin-left:20px}
.app-tab{height:36px;padding:0 14px;background:transparent;border:none;color:var(--text3);font-size:13px;cursor:pointer;font-family:var(--font-body);border-radius:8px;display:flex;align-items:center;gap:6px;font-weight:500;transition:.2s}
.app-tab:hover{background:var(--blue-xlight);color:var(--blue)}
.app-tab.on{background:var(--blue-xlight);color:var(--blue);font-weight:700}
.app-tab i{font-size:15px}
.app-bar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.domain-pill{font-family:var(--font-mono);font-size:10px;padding:4px 10px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:20px;color:var(--text3)}
.user-ava{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:12px;color:#fff}

/* CONTENT */
.app-content{flex:1;overflow:hidden;display:flex}
.panel{flex:1;overflow-y:auto;padding:24px;display:none}
.panel.on{display:block}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* DASHBOARD */
.dash-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.dash-stat{background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--r);padding:20px}
.ds-icon{font-size:22px;margin-bottom:10px;color:var(--blue)}
.ds-val{font-family:var(--font-display);font-size:32px;font-weight:800;color:var(--navy);line-height:1;margin-bottom:4px}
.ds-lbl{font-size:12px;color:var(--text3);font-family:var(--font-mono)}
.ds-chg{font-size:12px;margin-top:6px;font-weight:600}
.ds-up{color:var(--green)}.ds-dn{color:var(--red)}

/* SEARCH */
.search-layout{display:grid;grid-template-columns:260px 1fr;gap:16px;height:100%}
.filters-panel{background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;position:sticky;top:0;height:fit-content}
.filter-title{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.filter-title i{color:var(--blue);font-size:16px}
.filter-group{margin-bottom:16px}
.filter-lbl{font-size:11px;color:var(--text3);font-family:var(--font-mono);letter-spacing:.06em;display:block;margin-bottom:6px;font-weight:600}
.results-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.results-count{font-family:var(--font-mono);font-size:12px;color:var(--text3)}
.results-count strong{font-family:var(--font-display);font-size:20px;color:var(--blue)}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.prop-card{background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.25s}
.prop-card:hover{border-color:var(--blue);transform:translateY(-3px);box-shadow:0 10px 32px rgba(29,91,211,.12)}
.prop-img{height:120px;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--border2);position:relative}
.prop-badge-wrap{position:absolute;top:8px;right:8px;display:flex;gap:4px}
.prop-body{padding:14px}
.prop-name{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--navy);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prop-price{font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--blue);margin-bottom:6px}
.prop-meta{display:flex;flex-wrap:wrap;gap:6px}
.prop-meta-tag{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.prop-meta-tag i{font-size:12px}
.prop-footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:6px}
.prop-btn{flex:1;height:30px;border:1.5px solid var(--border);border-radius:var(--rxs);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;font-family:var(--font-body);transition:.2s;font-weight:500}
.prop-btn:hover{border-color:var(--blue);color:var(--blue)}
.prop-btn.prim{background:var(--blue);color:#fff;border-color:var(--blue)}
.load-more-btn{width:100%;height:44px;border:1.5px dashed var(--border);border-radius:var(--r);background:transparent;color:var(--text3);font-size:13px;cursor:pointer;margin-top:16px;transition:.2s;font-family:var(--font-body)}
.load-more-btn:hover{border-color:var(--blue);color:var(--blue)}

/* CHAT */
.chat-layout{display:flex;flex-direction:column;height:calc(100vh - 60px);margin:-24px}
.chat-msgs{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px}
.chat-msgs::-webkit-scrollbar{width:4px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.msg-user{display:flex;justify-content:flex-end}
.msg-user-bub{background:var(--blue);color:#fff;padding:12px 18px;border-radius:18px 4px 18px 18px;font-size:14.5px;max-width:72%;font-weight:500;line-height:1.5}
.msg-ai-wrap{display:flex;gap:10px;align-items:flex-start;max-width:88%}
.ai-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:12px;color:#fff;flex-shrink:0;margin-top:2px}
.msg-ai-bub{background:var(--bg-card);border:1.5px solid var(--border);border-radius:4px 18px 18px 18px;padding:14px 18px;font-size:14.5px;color:var(--text);line-height:1.65;box-shadow:0 2px 12px rgba(29,91,211,.06)}
.chat-input-area{padding:16px 24px;background:var(--bg-card);border-top:1.5px solid var(--border);flex-shrink:0}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-input-wrap{flex:1;background:var(--bg-elevated);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 16px;display:flex;gap:8px;align-items:flex-end;transition:.2s}
.chat-input-wrap:focus-within{border-color:var(--blue);background:var(--bg-card)}
.chat-textarea{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--text);font-family:var(--font-body);resize:none;min-height:24px;max-height:80px;line-height:1.5}
.chat-textarea::placeholder{color:var(--text4)}
.chat-send{width:42px;height:42px;background:var(--blue);border:none;border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;transition:.2s;flex-shrink:0}
.chat-send:hover{background:#1548B5}
.chat-send i{font-size:18px}
.mic-btn{width:42px;height:42px;background:var(--bg-elevated);border:1.5px solid var(--border);border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:.2s;flex-shrink:0}
.mic-btn:hover{border-color:var(--blue);color:var(--blue)}
.mic-btn.rec{background:rgba(229,68,68,.1);border-color:var(--red);color:var(--red);animation:recpulse 1s infinite}
@keyframes recpulse{0%,100%{opacity:1}50%{opacity:.6}}
.sys-note{text-align:center;font-size:11px;color:var(--text4);font-family:var(--font-mono);padding:4px 0}
.qr-chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.qr-chip{font-size:12px;padding:6px 13px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:20px;color:var(--text2);cursor:pointer;transition:.2s;font-family:var(--font-body)}
.qr-chip:hover{border-color:var(--blue);color:var(--blue)}

.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:800px){
  .search-layout{grid-template-columns:1fr}
  .dash-stats{grid-template-columns:repeat(2,1fr)}
  .app-tabs .app-tab span{display:none}
}
</style>
</head>
<body class="bm-bg">

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg width="36" height="36" viewBox="0 0 36 36">
        <path d="M18 4L32 12L18 20L4 12L18 4Z" fill="#1D5BD3"/>
        <path d="M4 12L18 20V32L4 24V12Z" fill="#0A3D9E"/>
        <path d="M32 12L18 20V32L32 24V12Z" fill="#10A89A"/>
      </svg>
    </div>
    <div class="login-title">Бизнесметр <span style="color:var(--blue)">CRM</span></div>
    <div class="login-sub">Подключитесь к вашей CRM-системе</div>
    <div id="login-err" class="login-err"></div>
    <div class="login-field">
      <label class="login-label">Домен CRM</label>
      <input type="text" id="l-domain" class="bm-input" placeholder="agency.crmnedv.ru">
    </div>
    <div class="login-field">
      <label class="login-label">Логин</label>
      <input type="text" id="l-user" class="bm-input" placeholder="username">
    </div>
    <div class="login-field">
      <label class="login-label">Пароль</label>
      <input type="password" id="l-pass" class="bm-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-primary" style="width:100%;justify-content:center;height:46px;font-size:14px;margin-top:4px" onclick="doLogin()" id="l-btn">
      <i class="ti ti-plug"></i>Подключиться
    </button>
    <div class="login-demo">Нет доступа? <a onclick="demoMode()">Войти в демо-режим</a></div>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="app-bar">
    <a href="index.html" class="bm-logo">
      <svg width="28" height="28" viewBox="0 0 36 36">
        <path d="M18 4L32 12L18 20L4 12L18 4Z" fill="#1D5BD3"/>
        <path d="M4 12L18 20V32L4 24V12Z" fill="#0A3D9E"/>
        <path d="M32 12L18 20V32L32 24V12Z" fill="#10A89A"/>
      </svg>
      <span class="bm-logo-text">Бизнес<b>метр</b><span class="bm-logo-ai">AI</span></span>
    </a>
    <div class="app-tabs">
      <button class="app-tab on" onclick="showPanel('dashboard',this)" id="t-dash"><i class="ti ti-dashboard"></i><span>Обзор</span></button>
      <button class="app-tab" onclick="showPanel('search',this)" id="t-search"><i class="ti ti-search"></i><span>Поиск</span></button>
      <button class="app-tab" onclick="showPanel('chat',this)" id="t-chat"><i class="ti ti-message-chatbot"></i><span>AI Риелтор</span></button>
    </div>
    <div class="app-bar-right">
      <div class="spinner" id="app-spinner"></div>
      <span class="domain-pill" id="domain-badge"></span>
      <div class="user-ava" id="user-ava">?</div>
      <button class="btn-ghost btn-sm" onclick="logout()"><i class="ti ti-logout"></i></button>
    </div>
  </div>

  <div class="app-content">

    <!-- DASHBOARD -->
    <div class="panel on" id="panel-dashboard">
      <div class="dash-stats">
        <div class="dash-stat bm-reveal">
          <div class="ds-icon"><i class="ti ti-building"></i></div>
          <div class="ds-val" id="ds-total">—</div>
          <div class="ds-lbl">объектов</div>
          <div class="ds-chg ds-up">+12 сегодня</div>
        </div>
        <div class="dash-stat bm-reveal">
          <div class="ds-icon" style="color:var(--green)"><i class="ti ti-circle-check"></i></div>
          <div class="ds-val" id="ds-active">—</div>
          <div class="ds-lbl">активных</div>
          <div class="ds-chg ds-up">+8%</div>
        </div>
        <div class="dash-stat bm-reveal">
          <div class="ds-icon" style="color:var(--teal)"><i class="ti ti-users"></i></div>
          <div class="ds-val" id="ds-users">—</div>
          <div class="ds-lbl">агентов</div>
        </div>
        <div class="dash-stat bm-reveal">
          <div class="ds-icon" style="color:var(--amber)"><i class="ti ti-clock"></i></div>
          <div class="ds-val" id="ds-updated">—</div>
          <div class="ds-lbl">обновлено</div>
        </div>
      </div>
      <div style="font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:8px">
        <i class="ti ti-history" style="color:var(--blue)"></i>Последние объекты
      </div>
      <div class="results-grid" id="recent-grid"></div>
    </div>

    <!-- SEARCH -->
    <div class="panel" id="panel-search">
      <div class="search-layout">
        <div class="filters-panel">
          <div class="filter-title"><i class="ti ti-adjustments-horizontal"></i>Фильтры</div>
          <div class="filter-group">
            <label class="filter-lbl">Категория</label>
            <select class="bm-select" id="f-cat" style="width:100%" onchange="doSearch()">
              <option value="">Все</option>
              <option value="1">Продажа</option>
              <option value="2">Аренда</option>
              <option value="3">Коммерческая</option>
              <option value="4">Зарубежная</option>
            </select>
          </div>
          <div class="filter-group">
            <label class="filter-lbl">Сортировка</label>
            <select class="bm-select" id="f-sort" style="width:100%" onchange="doSearch()">
              <option value="updated">По дате</option>
              <option value="price">По цене</option>
            </select>
          </div>
          <div class="filter-group">
            <label class="filter-lbl">Поиск</label>
            <input class="bm-input" id="f-text" placeholder="Район, метро, тип..." onkeydown="if(event.key==='Enter')doSearch()">
          </div>
          <button class="btn-primary" style="width:100%;justify-content:center;margin-bottom:8px" onclick="doSearch()"><i class="ti ti-search"></i>Найти</button>
          <button class="btn-ghost" style="width:100%;justify-content:center" onclick="resetSearch()"><i class="ti ti-x"></i>Сбросить</button>
        </div>
        <div>
          <div class="results-hdr">
            <div class="results-count">Найдено: <strong id="res-count">—</strong></div>
            <div id="search-spinner" class="spinner"></div>
          </div>
          <div class="results-grid" id="search-grid"></div>
          <button class="load-more-btn" id="load-more" onclick="loadMore()" style="display:none"><i class="ti ti-chevrons-down"></i> Загрузить ещё</button>
        </div>
      </div>
    </div>

    <!-- CHAT -->
    <div class="panel" id="panel-chat">
      <div class="chat-layout">
        <div class="chat-msgs" id="chat-msgs"></div>
        <div class="chat-input-area">
          <div class="chat-input-row">
            <button class="mic-btn" id="mic-btn" onclick="toggleMic()"><i class="ti ti-microphone" style="font-size:16px"></i></button>
            <div class="chat-input-wrap">
              <textarea class="chat-textarea" id="chat-inp" placeholder="Спросите AI-риелтора об объектах..." rows="1"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();chatSend()}"></textarea>
            </div>
            <button class="chat-send" onclick="chatSend()"><i class="ti ti-send"></i></button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const S={token:null,domain:null,user:null,demo:false,page:1,busy:false,recog:null,recording:false};

async function doLogin(){
  const domain=document.getElementById('l-domain').value.trim().replace(/^https?:\/\//,'').replace(/\/$/,'');
  const user=document.getElementById('l-user').value.trim();
  const pass=document.getElementById('l-pass').value.trim();
  if(!domain||!user||!pass){showErr('Заполните все поля');return}
  const btn=document.getElementById('l-btn');
  btn.disabled=true;btn.innerHTML='<div class="spinner" style="display:block"></div>';
  try{
    const r=await crmReq(domain,'POST','/rest_api/rest_api/token.json',{User:{username:user,password:pass}},null);
    if(r?.data?.token){S.token=r.data.token;S.domain=domain;S.user={login:user};enterApp();}
    else showErr('Неверные данные');
  }catch(e){showErr('Ошибка подключения');}
  btn.disabled=false;btn.innerHTML='<i class="ti ti-plug"></i>Подключиться';
}
function demoMode(){S.demo=true;S.domain='demo.crmnedv.ru';S.token='demo';S.user={login:'demo'};enterApp()}
function enterApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-screen').style.display='flex';
  document.getElementById('domain-badge').textContent=S.domain;
  document.getElementById('user-ava').textContent=S.user.login[0].toUpperCase();
  loadDash();initChat();
}
function logout(){S.token=null;S.domain=null;S.demo=false;document.getElementById('login-screen').style.display='flex';document.getElementById('app-screen').style.display='none';}
function showErr(m){const e=document.getElementById('login-err');e.textContent=m;e.style.display='block';}

async function crmReq(domain,method,path,data,token){
  try{
    const r=await fetch('/api/crm',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({crm_domain:domain||S.domain,path,method,data,token:token||S.token})});
    return await r.json();
  }catch(e){return null;}
}
async function crmGet(path){
  if(S.demo)return getDemoData(path);
  return crmReq(S.domain,'GET',path,null,S.token);
}

async function loadDash(){
  const data=await crmGet('/admin/agency/realty/index.json?api_token='+S.token+'&sort=updated');
  const items=data?.data||demoItems();
  const count=data?.count||items.length;
  document.getElementById('ds-total').textContent=count;
  document.getElementById('ds-active').textContent=Math.round(count*.72);
  document.getElementById('ds-updated').textContent=new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  const ud=await crmGet('/admin/dictionaries/dictionaries/index/Users.User.json?api_token='+S.token);
  document.getElementById('ds-users').textContent=ud?.data?.length||'—';
  renderGrid('recent-grid',items.slice(0,6));
  document.querySelectorAll('.bm-reveal').forEach(el=>el.classList.add('in'));
}

let searchPage=1,searchAll=[];
async function doSearch(reset=true){
  if(reset){searchPage=1;searchAll=[]}
  const cat=document.getElementById('f-cat').value;
  const sort=document.getElementById('f-sort').value;
  const text=document.getElementById('f-text').value.trim();
  document.getElementById('search-spinner').style.display='block';
  let path='/admin/agency/realty/index.json?api_token='+S.token+'&sort='+sort+'&page='+searchPage;
  if(cat)path+='&category_id='+cat;
  const data=await crmGet(path);
  const items=data?.data||demoItems();
  const total=data?.count||items.length;
  if(reset)searchAll=items;else searchAll=[...searchAll,...items];
  let filtered=searchAll;
  if(text){const t=text.toLowerCase();filtered=searchAll.filter(p=>(p.title||p.name||'').toLowerCase().includes(t)||(p.address||'').toLowerCase().includes(t));}
  document.getElementById('res-count').textContent=total;
  renderGrid('search-grid',filtered,!reset);
  document.getElementById('search-spinner').style.display='none';
  document.getElementById('load-more').style.display=items.length>=10?'block':'none';
}
function loadMore(){searchPage++;doSearch(false)}
function resetSearch(){document.getElementById('f-cat').value='';document.getElementById('f-sort').value='updated';document.getElementById('f-text').value='';doSearch();}

function renderGrid(id,items,append=false){
  const g=document.getElementById(id);
  const emojis=['🏢','🏪','🏭','🏗','🏘'];
  const html=items.map(p=>{
    const title=esc(p.title||p.name||'Без названия');
    const price=p.price?fmtPrice(p.price):'—';
    const area=p.area?p.area+' м²':'';
    const addr=esc(p.address||p.city||'');
    const status=p.status_id==1?'bm-badge-teal':'bm-badge-blue';
    const statusTxt=p.status_id==1?'Активный':'Архив';
    const ico=emojis[Math.floor(Math.random()*emojis.length)];
    return `<div class="prop-card">
      <div class="prop-img">${ico}
        <div class="prop-badge-wrap"><span class="bm-badge ${status}">${statusTxt}</span></div>
      </div>
      <div class="prop-body">
        <div class="prop-name">${title}</div>
        <div class="prop-price">${price}</div>
        <div class="prop-meta">
          ${area?'<span class="prop-meta-tag"><i class="ti ti-ruler-2"></i>'+area+'</span>':''}
          ${addr?'<span class="prop-meta-tag"><i class="ti ti-map-pin"></i>'+addr.slice(0,18)+'</span>':''}
        </div>
      </div>
      <div class="prop-footer">
        <button class="prop-btn" onclick="chatAsk('${title}')">Спросить AI</button>
        <button class="prop-btn prim">Открыть</button>
      </div>
    </div>`;
  }).join('');
  if(append)g.insertAdjacentHTML('beforeend',html);
  else g.innerHTML=items.length?html:'<div style="color:var(--text3);font-size:13px;grid-column:1/-1">Не найдено</div>';
}

function showPanel(name,btn){
  ['dashboard','search','chat'].forEach(p=>{
    document.getElementById('panel-'+p).classList.toggle('on',p===name);
    document.getElementById('t-'+p).classList.toggle('on',p===name);
  });
  if(name==='search'&&document.getElementById('search-grid').innerHTML==='')doSearch();
}
function chatAsk(title){showPanel('chat',null);setTimeout(()=>{document.getElementById('chat-inp').value='Расскажи об объекте: '+title;chatSend();},100);}

// CHAT
function initChat(){
  sysNote('Алекс подключён · '+S.domain+(S.demo?' · демо':''));
  addAiMsg('Привет! Я Алекс, AI-риелтор. Подключён к CRM '+S.domain+'. Чем помочь?',['Что в базе?','Покажи офисы','Активные объекты']);
}
let chatHistory=[];
async function chatSend(){
  if(S.busy)return;
  const inp=document.getElementById('chat-inp');
  const q=inp.value.trim();if(!q)return;
  inp.value='';inp.style.height='auto';
  S.busy=true;document.querySelector('.chat-send').disabled=true;
  addUserMsg(q);chatHistory.push({role:'user',content:q});
  const typing=addTyping();
  const ctx=await crmGet('/admin/agency/realty/index.json?api_token='+S.token+'&sort=updated');
  const items=(ctx?.data||demoItems()).slice(0,12);
  const sys='Ты Алекс — AI-риелтор. CRM: '+S.domain+'. Объекты:\n'+items.map(p=>'- '+JSON.stringify({id:p.id,title:p.title||p.name,price:p.price,area:p.area,address:p.address})).join('\n')+'\nОтвечай кратко (до 120 слов), по-русски, без markdown.';
  try{
    const r=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:sys,messages:chatHistory.slice(-8),max_tokens:400})});
    const d=await r.json();const text=d?.content?.[0]?.text||'Нет ответа.';
    typing.remove();chatHistory.push({role:'assistant',content:text});addAiMsg(text);
    if(window.speechSynthesis&&text){const u=new SpeechSynthesisUtterance(text.slice(0,200));u.lang='ru-RU';window.speechSynthesis.speak(u);}
  }catch(e){typing.remove();addAiMsg('Ошибка подключения.');}
  S.busy=false;document.querySelector('.chat-send').disabled=false;
}

function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Голосовой ввод не поддерживается');return;}
  if(S.recording){if(S.recog)S.recog.stop();S.recording=false;document.getElementById('mic-btn').classList.remove('rec');return;}
  S.recog=new SR();S.recog.lang='ru-RU';S.recog.interimResults=true;
  S.recog.onresult=e=>{const t=[...e.results].map(r=>r[0].transcript).join('');document.getElementById('chat-inp').value=t;if(e.results[e.results.length-1].isFinal){S.recording=false;document.getElementById('mic-btn').classList.remove('rec');chatSend();}};
  S.recog.start();S.recording=true;document.getElementById('mic-btn').classList.add('rec');
}

const cm=()=>document.getElementById('chat-msgs');
const cscroll=()=>setTimeout(()=>{const m=cm();m.scrollTop=m.scrollHeight},60);
function addUserMsg(t){cm().appendChild(mk('<div class="msg-user"><div class="msg-user-bub">'+esc(t)+'</div></div>'));cscroll();}
function addTyping(){const d=mk('<div class="msg-ai-wrap"><div class="ai-avatar">А</div><div class="msg-ai-bub"><div class="bm-typing"><s></s><s></s><s></s></div></div></div>');cm().appendChild(d);cscroll();return d;}
function addAiMsg(t,qr=[]){
  const qrHtml=qr.length?'<div class="qr-chips">'+qr.map(q=>'<span class="qr-chip" onclick="chatSend2(\''+q.replace(/'/g,"\'")+'\')">'+q+'</span>').join('')+'</div>':'';
  cm().appendChild(mk('<div class="msg-ai-wrap"><div class="ai-avatar">А</div><div class="msg-ai-bub">'+esc(t)+qrHtml+'</div></div>'));cscroll();
}
function chatSend2(t){document.getElementById('chat-inp').value=t;chatSend();}
function sysNote(t){cm().appendChild(mk('<div class="sys-note">'+t+'</div>'));cscroll();}
function mk(h){const d=document.createElement('div');d.innerHTML=h;return d.firstChild;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtPrice(p){const n=parseFloat(p);if(n>=1e6)return(n/1e6).toFixed(1).replace('.0','')+'М₽';if(n>=1e3)return Math.round(n/1e3)+'K₽';return n+'₽';}
document.getElementById('chat-inp')?.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'});

function demoItems(){return[
  {id:1,title:'Офис Тверская',price:255000,area:85,address:'ЦАО',status_id:1},
  {id:2,title:'Склад Котельники',price:250000,area:500,address:'МО',status_id:1},
  {id:3,title:'Торговое Арбат',price:480000,area:120,address:'ЦАО',status_id:1},
  {id:4,title:'Офис Москва-Сити',price:900000,area:150,address:'ЦАО',status_id:1},
  {id:5,title:'Цех ЮВАО',price:390000,area:650,address:'ЮВАО',status_id:2},
  {id:6,title:'Ресторан Патриаршие',price:960000,area:200,address:'ЦАО',status_id:1},
];}
function getDemoData(path){
  if(path.includes('Users'))return{data:[{id:1,name:'Иванов'},{id:2,name:'Петрова'}]};
  return{data:demoItems(),count:147,page:1};
}
</script>
</body>
</html>
