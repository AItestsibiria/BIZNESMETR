<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Алекс · AI Риелтор — Бизнесметр</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Golos+Text:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090A;--bg1:#111113;--bg2:#18181C;--bg3:#222228;
  --border:#2A2A32;--border2:#38383F;
  --gold:#C8A040;--gold-dim:#6A5420;--gold-glow:rgba(200,160,64,.1);
  --text:#F0EFE8;--text2:#A0A09A;--text3:#555;
  --green:#3AA870;--red:#CC5555;--blue:#5087B8;
  --r:10px;--rs:6px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px,var(--border) 1px,transparent 0);background-size:32px 32px;opacity:.3;pointer-events:none;z-index:0}
h1,h2,.syne{font-family:'Syne',sans-serif}
.mono{font-family:'JetBrains Mono',monospace}

/* HEADER */
.header{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);background:rgba(9,9,10,.95);backdrop-filter:blur(12px);flex-shrink:0;position:relative;z-index:10}
.back-btn{width:34px;height:34px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);text-decoration:none;transition:all .2s}
.back-btn:hover{border-color:var(--border2);color:var(--text)}
.agent-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--gold-dim),var(--gold));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#09090A;flex-shrink:0;position:relative}
.agent-avatar::after{content:'';position:absolute;bottom:0;right:0;width:10px;height:10px;background:var(--green);border-radius:50%;border:2px solid var(--bg)}
.agent-info{flex:1}
.agent-name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;color:var(--text)}
.agent-status{font-size:12px;color:var(--green);display:flex;align-items:center;gap:4px}
.agent-status::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;display:inline-block;animation:pulse 2s infinite}
.header-stats{display:flex;gap:16px;margin-left:auto}
.hstat{text-align:right}
.hstat-val{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text)}
.hstat-lbl{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:1}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* USER MSG */
.msg-user{display:flex;justify-content:flex-end}
.msg-user-bubble{background:var(--gold);color:#09090A;padding:10px 16px;border-radius:16px 4px 16px 16px;font-size:14px;max-width:70%;line-height:1.55;font-weight:500}

/* AI MSG */
.msg-ai{display:flex;gap:10px;align-items:flex-start;max-width:85%}
.ai-ava{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold-dim),var(--gold));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#09090A;flex-shrink:0;margin-top:2px}
.ai-bubble{background:var(--bg1);border:1px solid var(--border);border-radius:4px 16px 16px 16px;padding:12px 16px;font-size:14px;color:var(--text2);line-height:1.65}
.ai-bubble strong{color:var(--text);font-weight:600}

/* TYPING */
.typing{display:inline-flex;gap:4px;align-items:center;padding:4px 0}
.typing span{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:typing 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-4px);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* PROPERTY CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:10px;width:100%}
.prop-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s,transform .2s;cursor:pointer}
.prop-card:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
.prop-img{height:110px;background:var(--bg3);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.prop-img-icon{font-size:32px;color:var(--text3)}
.prop-img-overlay{position:absolute;top:8px;right:8px}
.prop-badge{font-size:10px;padding:3px 8px;border-radius:20px;font-family:'JetBrains Mono',monospace;font-weight:500}
.badge-rent{background:rgba(80,135,184,.2);color:var(--blue);border:1px solid rgba(80,135,184,.3)}
.badge-sale{background:rgba(200,160,64,.15);color:var(--gold);border:1px solid var(--gold-dim)}
.prop-body{padding:10px 12px}
.prop-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prop-price{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--gold);margin-bottom:6px}
.prop-meta{display:flex;gap:8px;flex-wrap:wrap}
.prop-tag{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:3px}
.prop-tag i{font-size:11px}
.prop-actions{display:flex;gap:6px;margin-top:8px}
.prop-btn{flex:1;height:28px;border:1px solid var(--border);border-radius:var(--rs);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;transition:all .2s;font-family:'Golos Text',sans-serif}
.prop-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.prop-btn.primary{background:var(--gold);color:#09090A;border-color:var(--gold);font-weight:600}

/* QUICK REPLIES */
.quick-replies{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.qr-btn{font-size:12px;padding:6px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;color:var(--text2);cursor:pointer;transition:all .2s;font-family:'Golos Text',sans-serif}
.qr-btn:hover{border-color:var(--gold-dim);color:var(--gold)}

/* STATS BAR */
.stats-bar{background:var(--bg1);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:24px;overflow-x:auto;flex-shrink:0;position:relative;z-index:1}
.stats-bar::-webkit-scrollbar{display:none}
.sbar-item{display:flex;flex-direction:column;white-space:nowrap}
.sbar-val{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
.sbar-lbl{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}

/* INPUT */
.input-area{padding:12px 20px;background:rgba(9,9,10,.95);border-top:1px solid var(--border);flex-shrink:0;position:relative;z-index:1}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-wrap{flex:1;background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r);padding:10px 14px;display:flex;gap:8px;align-items:flex-end;transition:border .2s}
.input-wrap:focus-within{border-color:var(--gold-dim)}
.chat-input{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--text);font-family:'Golos Text',sans-serif;resize:none;min-height:24px;max-height:100px;line-height:1.5}
.chat-input::placeholder{color:var(--text3)}
.send-btn{width:40px;height:40px;background:var(--gold);border:none;border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.send-btn i{font-size:17px;color:#09090A}
.input-hint{font-size:11px;color:var(--text3);margin-top:6px;text-align:center;font-family:'JetBrains Mono',monospace}

/* SYSTEM NOTE */
.sys-note{text-align:center;font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;padding:4px 0}

/* PROP DETAIL */
.prop-detail-banner{background:var(--bg2);border:1px solid var(--gold-dim);border-radius:var(--r);padding:14px;margin-top:8px}
.pdb-header{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.pdb-icon{width:44px;height:44px;background:var(--gold-glow);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--gold);border:1px solid var(--gold-dim);flex-shrink:0}
.pdb-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
.pdb-price{font-size:18px;font-weight:800;color:var(--gold);font-family:'Syne',sans-serif}
.pdb-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pdb-item{background:var(--bg3);border-radius:var(--rs);padding:8px 10px}
.pdb-lbl{font-size:10px;color:var(--text3);margin-bottom:2px}
.pdb-val{font-size:13px;color:var(--text);font-weight:500}
.pdb-actions{display:flex;gap:8px;margin-top:10px}
.pdb-btn{flex:1;height:36px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:'Golos Text',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.pdb-btn:hover{border-color:var(--border2);color:var(--text)}
.pdb-btn.gold{background:var(--gold);color:#09090A;border-color:var(--gold);font-weight:600}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.msg-user,.msg-ai,.sys-note{animation:fadeUp .3s ease}

@media(max-width:600px){
  .header-stats{display:none}
  .cards-grid{grid-template-columns:1fr}
}
</style>
</head>

function searchDB(params={}) {
  let results = [...DB];
  if(params.type) results=results.filter(p=>p.type===params.type||p.type.includes(params.type));
  if(params.deal) results=results.filter(p=>p.deal===params.deal);
  if(params.district) results=results.filter(p=>p.district.toLowerCase().includes(params.district.toLowerCase())||p.metro.toLowerCase().includes(params.district.toLowerCase()));
  if(params.area_min) results=results.filter(p=>p.area>=params.area_min);
  if(params.area_max) results=results.filter(p=>p.area<=params.area_max);
  if(params.price_max) results=results.filter(p=>p.price<=params.price_max);
  if(params.price_min) results=results.filter(p=>p.price>=params.price_min);
  document.getElementById('cnt-found').textContent=results.length;
  return results.slice(0,6);
}

// AI ЧАТЬ
// ══════════════════════════════════════════════
const SYSTEM_PROMPT = `Ты Алекс — опытный AI-риелтор платформы Бизнесметр по коммерческой недвижимости Москвы.

БАЗА ОБЪЕКТОВ (JSON):
${JSON.stringify(DB.map(p=>({id:p.id,type:p.type,title:p.title,area:p.area,price:p.price,deal:p.deal,district:p.district,metro:p.metro,class:p.class||'—',parking:p.parking})))}

ПРАВИЛА:
1. Отвечай по-русски, кратко и по делу как живой риелтор (максимум 120 слов)
2. Когда находишь подходящие объекты — обязательно укажи их ID в формате [IDS:1,2,3]
3. Уточняй требования если запрос неточный
4. Форматируй цены красиво: 250 000 ₽/мес или 42 000 000 ₽
5. Не используй markdown символы (* # и т.д.)
6. Будь дружелюбным, помогай выбрать лучший вариант`;

let history = [];
let busy = false;

async function callAI(userMsg) {
  history.push({role:"user",content:userMsg});
  try {
    const r = await fetch('/api/claude', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: history.slice(-10),
        max_tokens: 600
      })
    });
    const d = await r.json();
    if(d.content?.[0]?.text) {
      const text = d.content[0].text;
      history.push({role:"assistant",content:text});
      return text;
    }
    throw new Error(d.error || 'no response');
  } catch(e) {
    console.error(e);
    return null;
  }
}

function smartReply(msg) {
  const m = msg.toLowerCase();
  let params = {};
  let reply = '';

  // Определяем тип
  if(m.includes('офис')) params.type='офис';
  else if(m.includes('склад')) params.type='склад';
  else if(m.includes('торгов')||m.includes('магазин')||m.includes('ритейл')) params.type='торговое';
  else if(m.includes('производ')||m.includes('цех')) params.type='производство';

  // Аренда/продажа
  if(m.includes('аренд')||m.includes('снять')||m.includes('арендовать')) params.deal='аренда';
  else if(m.includes('купить')||m.includes('покупк')||m.includes('продаж')||m.includes('приобрести')) params.deal='продажа';

  // Районы
  const districts=['ЦАО','ЮВАО','СВАО','ЗАО','СЗАО','ЮАО','ВАО','САО'];
  for(const d of districts){ if(m.includes(d.toLowerCase())||m.includes(d)) params.district=d; }
  if(m.includes('центр')||m.includes('сити')||m.includes('арбат')||m.includes('тверск')) params.district='ЦАО';
  if(m.includes('нагатин')||m.includes('подольск')||m.includes('люберц')||m.includes('котельник')) params.district='МО';

  // Площадь
  const areaMatch = msg.match(/(\d+)\s*[-–до]+\s*(\d+)\s*м/);
  if(areaMatch){ params.area_min=parseInt(areaMatch[1]); params.area_max=parseInt(areaMatch[2]); }
  const areaFrom = msg.match(/от\s*(\d+)\s*м/);
  if(areaFrom) params.area_min=parseInt(areaFrom[1]);
  const areaTo = msg.match(/до\s*(\d+)\s*м/);
  if(areaTo) params.area_max=parseInt(areaTo[1]);

  // Цена
  const priceMatch = msg.match(/до\s*([\d\s]+)\s*(тыс|млн|₽)/);
  if(priceMatch){
    let v = parseInt(priceMatch[1].replace(/\s/g,''));
    if(priceMatch[2]==='тыс') v*=1000;
    if(priceMatch[2]==='млн') v*=1000000;
    params.price_max=v;
  }

  const found = searchDB(params);

  if(Object.keys(params).length===0){
    return {text:"Привет! Я Алекс, помогу найти коммерческую недвижимость в Москве. Что именно ищете — офис, склад, торговое? Укажите тип объекта, примерную площадь и бюджет.", ids:[]};
  }

  if(found.length===0){
    return {text:"По вашим параметрам объектов не нашлось. Попробуйте расширить критерии — другой район или площадь?", ids:[]};
  }

  const typeStr = params.type||'объект';
  const dealStr = params.deal==='аренда'?'аренды':'продажи';
  reply = `Нашёл ${found.length} вариантов ${typeStr}а для ${dealStr}. Вот лучшие предложения по вашим критериям:`;

  return {text:reply, ids:found.map(p=>p.id)};
}

const msgs = document.getElementById('msgs');

function addUserMsg(text){ msgs.appendChild(el(`<div class="msg-user"><div class="msg-user-bubble">${esc(text)}</div></div>`)); scroll(); }

function addSysNote(text){ msgs.appendChild(el(`<div class="sys-note">${text}</div>`)); scroll(); }

function addLoader(){
  const d=el(`<div class="msg-ai"><div class="ai-ava">А</div><div class="ai-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`);
  msgs.appendChild(d); scroll(); return d;
}

function addAIMsg(text, ids=[], quickReplies=[]) {
  const cardHtml = ids.length ? renderCards(ids) : '';
  const qrHtml = quickReplies.length ? `<div class="quick-replies">${quickReplies.map(q=>`<button class="qr-btn" onclick="sendMsg('${q}')">${q}</button>`).join('')}</div>` : '';
  const d = el(`<div class="msg-ai"><div class="ai-ava">А</div><div class="ai-bubble"><div>${esc(text)}</div>${cardHtml}${qrHtml}</div></div>`);
  msgs.appendChild(d); scroll();
}

function renderCards(ids) {
  const items = ids.map(id=>DB.find(p=>p.id===id)).filter(Boolean);
  if(!items.length) return '';
  return `<div class="cards-grid">${items.map(p=>`
    <div class="prop-card" onclick="showDetail(${p.id})">
      <div class="prop-img">
        <i class="ti ${p.icon} prop-img-icon"></i>
        <div class="prop-img-overlay"><span class="prop-badge ${p.deal==='аренда'?'badge-rent':'badge-sale'}">${p.deal}</span></div>
      </div>
      <div class="prop-body">
        <div class="prop-title">${p.title}</div>
        <div class="prop-price">${fmtPrice(p.price,p.deal)}</div>
        <div class="prop-meta">
          <span class="prop-tag"><i class="ti ti-ruler-2"></i>${p.area} м²</span>
          <span class="prop-tag"><i class="ti ti-map-pin"></i>${p.district}</span>
          ${p.metro!=='—'?`<span class="prop-tag"><i class="ti ti-train"></i>${p.metro}</span>`:''}
        </div>
        <div class="prop-actions">
          <button class="prop-btn" onclick="event.stopPropagation();sendMsg('Расскажи подробнее об объекте ${p.id}')">Подробнее</button>
          <button class="prop-btn primary" onclick="event.stopPropagation();sendMsg('Хочу посмотреть объект ${p.id} — как записаться?')">Записаться</button>
        </div>
      </div>
    </div>`).join('')}</div>`;
}

function showDetail(id) {
  const p = DB.find(x=>x.id===id);
  if(!p) return;
  const d = el(`<div class="msg-ai"><div class="ai-ava">А</div><div class="ai-bubble">
    <div class="prop-detail-banner">
      <div class="pdb-header">
        <div class="pdb-icon"><i class="ti ${p.icon}"></i></div>
        <div><div class="pdb-title">${p.title}</div><div class="pdb-price">${fmtPrice(p.price,p.deal)}</div></div>
      </div>
      <div class="pdb-grid">
        <div class="pdb-item"><div class="pdb-lbl">Площадь</div><div class="pdb-val">${p.area} м²</div></div>
        <div class="pdb-item"><div class="pdb-lbl">Район</div><div class="pdb-val">${p.district}</div></div>
        <div class="pdb-item"><div class="pdb-lbl">Метро</div><div class="pdb-val">${p.metro}</div></div>
        <div class="pdb-item"><div class="pdb-lbl">Класс</div><div class="pdb-val">${p.class}</div></div>
        <div class="pdb-item"><div class="pdb-lbl">Этаж</div><div class="pdb-val">${p.floor} из ${p.total_floors}</div></div>
        <div class="pdb-item"><div class="pdb-lbl">Парковка</div><div class="pdb-val">${p.parking?'✓ есть':'—'}</div></div>
      </div>
      <div style="margin-top:8px;font-size:12px;color:var(--text2);line-height:1.6">${p.desc}</div>
      <div class="pdb-actions">
        <button class="pdb-btn" onclick="sendMsg('Как проехать к объекту ${p.title}?')"><i class="ti ti-map-pin"></i>Маршрут</button>
        <button class="pdb-btn gold" onclick="sendMsg('Хочу записаться на просмотр объекта ${p.title}')"><i class="ti ti-calendar"></i>Записаться</button>
      </div>
    </div>
  </div></div>`);
  msgs.appendChild(d); scroll();
}

function fmtPrice(p,deal){
  if(p>=1000000) return (p/1000000).toFixed(1).replace('.0','')+' млн ₽'+(deal==='аренда'?'/мес':'');
  return p.toLocaleString('ru')+'₽'+(deal==='аренда'?'/мес':'');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function el(html){const d=document.createElement('div');d.innerHTML=html;return d.firstChild}
function scroll(){setTimeout(()=>msgs.scrollTop=msgs.scrollHeight,60)}

// ОТПРАВКА
// ══════════════════════════════════════════════
async function send() {
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if(!txt||busy) return;
  sendMsg(txt);
  inp.value='';
  inp.style.height='auto';
}

async function sendMsg(txt) {
  if(busy) return;
  busy=true;
  document.getElementById('send-btn').disabled=true;

  addUserMsg(txt);
  const loader = addLoader();

  // Пробуем AI
  const aiText = await callAI(txt);

  loader.remove();

  if(aiText){
    // Извлекаем IDs из ответа AI [IDS:1,2,3]
    const idMatch = aiText.match(/\[IDS:([\d,]+)\]/);
    const ids = idMatch ? idMatch[1].split(',').map(Number) : [];
    const cleanText = aiText.replace(/\[IDS:[\d,]+\]/,'').trim();
    addAIMsg(cleanText, ids);
  } else {
    // Fallback: умный локальный поиск
    const {text,ids} = smartReply(txt);
    const qr = ids.length ? [] : ['Офис в центре до 300 тыс','Склад от 500 м²','Торговое помещение аренда','Офис продажа ЦАО'];
    addAIMsg(text, ids, qr);
  }

  busy=false;
  document.getElementById('send-btn').disabled=false;
}
