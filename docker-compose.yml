services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: biznesmetr
      POSTGRES_PASSWORD: biznesmetr
      POSTGRES_DB: biznesmetr
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biznesmetr -d biznesmetr"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://biznesmetr:biznesmetr@postgres:5432/biznesmetr?schema=public
    expose:
      - "3000"
    volumes:
      # Mount the Google service account JSON read-only at runtime.
      - ./secrets/google-credentials.json:/run/secrets/google-credentials.json:ro

  caddy:
    # TODO(muziai): swap for nginx/Traefik if that's what MuziAI uses.
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
