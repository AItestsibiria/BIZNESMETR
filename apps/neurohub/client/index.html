  <body>
    <div id="root"></div>
    <script>
      // Redirect non-hash routes to hash-router paths for share/play links
      // so that direct URLs like /share/42 (sent in emails/QR) work with wouter's useHashLocation.
      (function () {
        var p = window.location.pathname;
        var m = p.match(/^\/(share|play|track)\/([\w-]+)\/?$/);
        if (m) {
          var target = '/' + window.location.search + '#/' + m[1] + '/' + m[2];
          window.location.replace(target);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>

         Если placeholder остался незаменённым — noscript не активен. -->
    <noscript><div><img src="https://mc.yandex.ru/watch/__YM_COUNTER_ID__" style="position:absolute; left:-9999px;" alt="" /></div></noscript>
