    <circle cx="28" cy="48" r="0.7" fill="rgba(200,200,220,0.95)"/>
    <circle cx="28" cy="53" r="0.7" fill="rgba(200,200,220,0.95)"/>
    <!-- Юбка-карандаш -->
    <path d="M 19 58 L 37 58 L 35 86 L 21 86 Z" fill="rgba(79,70,229,0.95)"/>
